{# Shared styles + scripts for IT credit hub pages (payments, audit, upcoming due). #}
<script>
  (function () {
    function initCreditFilterPanels() {
      var panels = document.querySelectorAll(".it-credit-filter");
      if (!panels.length) return;
      var mq = window.matchMedia("(min-width: 768px)");
      function syncOpen() {
        panels.forEach(function (panel) {
          if (mq.matches) {
            panel.setAttribute("open", "");
            return;
          }
          var hasActive = panel.querySelector(".it-credit-pill--active");
          if (hasActive) {
            panel.setAttribute("open", "");
          }
        });
      }
      syncOpen();
      if (typeof mq.addEventListener === "function") {
        mq.addEventListener("change", syncOpen);
      } else if (typeof mq.addListener === "function") {
        mq.addListener(syncOpen);
      }
    }

    function wireCreditDateFilter(form) {
      var mode = form.querySelector('[name="mode"]');
      if (!mode) return;
      var day = form.querySelector('[data-credit-filter="single_day"]');
      var period = form.querySelector('[data-credit-filter="period"]');
      var month = form.querySelector('[data-credit-filter="month"]');
      var year = form.querySelector('[data-credit-filter="year"]');
      function sync() {
        var v = (mode.value || "single_day").toLowerCase();
        if (day) day.classList.toggle("hidden", v !== "single_day");
        if (period) period.classList.toggle("hidden", v !== "period");
        if (month) month.classList.toggle("hidden", v !== "month");
        if (year) year.classList.toggle("hidden", v !== "year");
      }
      mode.addEventListener("change", sync);
      sync();
    }

    function wireCreditLiveFilter(form) {
      if (!form || !form.classList.contains("it-credit-live-filter")) return;
      wireCreditDateFilter(form);
      var submitTimer = null;
      var searchTimer = null;
      function submitSoon(delay) {
        if (submitTimer) clearTimeout(submitTimer);
        submitTimer = setTimeout(function () {
          submitTimer = null;
          if (typeof form.requestSubmit === "function") {
            form.requestSubmit();
          } else {
            form.submit();
          }
        }, delay == null ? 120 : delay);
      }
      form.querySelectorAll("select").forEach(function (el) {
        el.addEventListener("change", function () {
          submitSoon(el.name === "mode" ? 80 : null);
        });
      });
      form.querySelectorAll('input[type="date"], input[type="month"]').forEach(function (el) {
        el.addEventListener("change", function () {
          submitSoon();
        });
      });
      var yearInput = form.querySelector('input[type="number"][name="year"]');
      if (yearInput) {
        yearInput.addEventListener("change", function () {
          submitSoon();
        });
        yearInput.addEventListener("input", function () {
          if (searchTimer) clearTimeout(searchTimer);
          searchTimer = setTimeout(function () {
            searchTimer = null;
            var y = parseInt(yearInput.value, 10);
            if (y >= 2000 && y <= 2100) submitSoon(0);
          }, 450);
        });
      }
      var daysInput = form.querySelector('input[type="number"][name="days"]');
      if (daysInput) {
        daysInput.addEventListener("change", function () {
          submitSoon();
        });
      }
      var allTime = form.querySelector('input[name="all_time"]');
      if (allTime) {
        allTime.addEventListener("change", function () {
          submitSoon(80);
        });
      }
      form.querySelectorAll('input[type="search"]').forEach(function (el) {
        el.addEventListener("input", function () {
          if (searchTimer) clearTimeout(searchTimer);
          searchTimer = setTimeout(function () {
            searchTimer = null;
            submitSoon(200);
          }, 500);
        });
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        initCreditFilterPanels();
        document.querySelectorAll(".it-credit-live-filter").forEach(wireCreditLiveFilter);
      });
    } else {
      initCreditFilterPanels();
      document.querySelectorAll(".it-credit-live-filter").forEach(wireCreditLiveFilter);
    }
  })();
</script>
