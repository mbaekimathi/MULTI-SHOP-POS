{# Shared styles + scripts for IT credit hub pages (payments, audit, upcoming due). #}
<style>
  .it-credit-hub-header {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  @media (min-width: 768px) {
    .it-credit-hub-header {
      flex-direction: row;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.25rem;
    }
  }

  .it-credit-intro {
    position: relative;
    overflow: hidden;
    flex: 1 1 auto;
    min-width: 0;
    border-radius: 1rem;
    border: 1px solid rgb(var(--rc-border) / 0.9);
    background: linear-gradient(
      135deg,
      rgb(var(--rc-surface)) 0%,
      rgb(var(--rc-surface-2) / 0.35) 100%
    );
    padding: 1.25rem 1.35rem;
    box-shadow: 0 1px 2px rgb(15 23 42 / 0.04), 0 8px 24px -12px rgb(15 23 42 / 0.12);
  }
  .it-credit-intro::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, rgb(249 115 22), rgb(56 189 248));
    border-radius: 3px 0 0 3px;
  }
  html[data-theme="dark"] .it-credit-intro {
    box-shadow: 0 1px 2px rgb(0 0 0 / 0.2), 0 12px 28px -14px rgb(0 0 0 / 0.45);
  }

  .it-credit-intro__icon {
    display: flex;
    height: 2.5rem;
    width: 2.5rem;
    flex-shrink: 0;
    align-items: center;
    justify-content: center;
    border-radius: 0.75rem;
    background: linear-gradient(135deg, rgb(var(--rc-primary) / 0.18), rgb(56 189 248 / 0.12));
    color: rgb(var(--rc-primary));
    border: 1px solid rgb(var(--rc-primary) / 0.2);
    box-shadow: 0 4px 14px -6px rgb(var(--rc-primary) / 0.35);
  }

  .it-credit-filter {
    width: 100%;
    flex-shrink: 0;
    border-radius: 1rem;
    border: 1px solid rgb(var(--rc-border) / 0.9);
    background: rgb(var(--rc-surface));
    box-shadow: 0 1px 2px rgb(15 23 42 / 0.05), 0 10px 28px -14px rgb(15 23 42 / 0.14);
    overflow: hidden;
  }
  @media (min-width: 768px) {
    .it-credit-filter {
      width: min(100%, 20rem);
      margin-left: auto;
    }
  }
  @media (min-width: 1024px) {
    .it-credit-filter {
      width: min(100%, 22rem);
    }
  }
  @media (min-width: 1280px) {
    .it-credit-filter {
      width: min(100%, 24rem);
    }
  }

  .it-credit-filter > summary {
    list-style: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.85rem 1rem;
    user-select: none;
    transition: background 0.15s ease;
  }
  .it-credit-filter > summary::-webkit-details-marker {
    display: none;
  }
  .it-credit-filter > summary:hover {
    background: rgb(var(--rc-surface-2) / 0.55);
  }
  @media (min-width: 768px) {
    .it-credit-filter > summary {
      cursor: default;
      pointer-events: none;
    }
    .it-credit-filter > summary:hover {
      background: transparent;
    }
  }

  .it-credit-filter__chevron {
    margin-left: auto;
    flex-shrink: 0;
    transition: transform 0.2s ease;
    color: rgb(var(--rc-muted));
  }
  .it-credit-filter[open] .it-credit-filter__chevron {
    transform: rotate(180deg);
  }
  @media (min-width: 768px) {
    .it-credit-filter__chevron {
      display: none;
    }
  }

  .it-credit-filter__body {
    padding: 0 1rem 1rem;
    border-top: 1px solid rgb(var(--rc-border) / 0.65);
  }
  @media (min-width: 768px) {
    .it-credit-filter__body {
      border-top: 0;
      padding-top: 0;
    }
    .it-credit-filter > summary {
      padding-bottom: 0.5rem;
    }
  }

  .it-credit-filter__grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.75rem;
    padding-top: 0.85rem;
  }
  @media (min-width: 480px) {
    .it-credit-filter__grid--2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  .it-credit-filter__grid .it-credit-field--span-2 {
    grid-column: 1 / -1;
  }

  .it-credit-label {
    display: block;
    margin-bottom: 0.35rem;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgb(var(--rc-muted));
  }

  .it-credit-input,
  .it-credit-filter select.it-credit-input {
    width: 100%;
    border-radius: 0.625rem;
    border: 1px solid rgb(var(--rc-border));
    background: rgb(var(--rc-surface-2));
    padding: 0.5rem 0.65rem;
    font-size: 0.8125rem;
    line-height: 1.35;
    color: rgb(var(--rc-page-fg));
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .it-credit-input:hover {
    border-color: rgb(var(--rc-primary) / 0.35);
  }
  .it-credit-input:focus {
    border-color: rgb(var(--rc-primary) / 0.55);
    box-shadow: 0 0 0 3px rgb(var(--rc-primary) / 0.12);
  }

  .it-credit-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    min-width: 0;
    flex: 1;
  }
  .it-credit-pill {
    display: inline-flex;
    max-width: 100%;
    align-items: center;
    gap: 0.25rem;
    border-radius: 999px;
    padding: 0.2rem 0.55rem;
    font-size: 0.65rem;
    font-weight: 600;
    line-height: 1.3;
    background: rgb(var(--rc-surface-2));
    color: rgb(var(--rc-muted));
    border: 1px solid rgb(var(--rc-border) / 0.8);
  }
  .it-credit-pill--active {
    background: rgb(var(--rc-primary) / 0.12);
    color: rgb(var(--rc-page-fg));
    border-color: rgb(var(--rc-primary) / 0.28);
  }
  .it-credit-pill__text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .it-credit-toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    border-radius: 0.625rem;
    border: 1px solid rgb(var(--rc-border) / 0.8);
    background: rgb(var(--rc-surface-2) / 0.6);
    padding: 0.5rem 0.65rem;
    cursor: pointer;
    font-size: 0.75rem;
    color: rgb(var(--rc-page-fg));
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .it-credit-toggle:hover {
    border-color: rgb(var(--rc-primary) / 0.35);
    background: rgb(var(--rc-surface-2));
  }
  .it-credit-toggle input {
    height: 1rem;
    width: 1rem;
    accent-color: rgb(var(--rc-primary));
  }

  .it-credit-filter__status {
    margin-top: 0.65rem;
    border-radius: 0.5rem;
    padding: 0.45rem 0.6rem;
    font-size: 0.7rem;
    line-height: 1.4;
    color: rgb(var(--rc-muted));
    background: rgb(var(--rc-surface-2) / 0.5);
    border: 1px solid rgb(var(--rc-border) / 0.6);
  }

  .it-credit-actions {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-top: 0.85rem;
    padding-top: 0.85rem;
    border-top: 1px solid rgb(var(--rc-border) / 0.65);
  }
  @media (min-width: 480px) {
    .it-credit-actions {
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
    }
    .it-credit-actions__primary {
      flex: 1 1 auto;
      min-width: 7rem;
    }
    .it-credit-actions__secondary {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
  }

  .it-credit-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
    border-radius: 0.625rem;
    padding: 0.5rem 0.85rem;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: transform 0.12s ease, box-shadow 0.15s ease;
  }
  .it-credit-btn:active {
    transform: scale(0.98);
  }

  /* Page shell & data sections */
  .it-credit-page {
    width: 100%;
    max-width: 100%;
  }

  .it-credit-stats {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.65rem;
    margin-bottom: 1rem;
  }
  @media (min-width: 640px) {
    .it-credit-stats {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.75rem;
    }
    .it-credit-stats--3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }

  .it-credit-stat {
    border-radius: 0.75rem;
    border: 1px solid rgb(var(--rc-border) / 0.85);
    background: rgb(var(--rc-surface-2) / 0.45);
    padding: 0.65rem 0.75rem;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .it-credit-stat:hover {
    border-color: rgb(var(--rc-primary) / 0.25);
    box-shadow: 0 6px 18px -12px rgb(15 23 42 / 0.2);
  }
  .it-credit-stat__label {
    font-size: 0.625rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgb(var(--rc-muted));
  }
  .it-credit-stat__value {
    margin-top: 0.2rem;
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.2;
    font-variant-numeric: tabular-nums;
    color: rgb(var(--rc-page-fg));
  }
  .it-credit-stat--amber .it-credit-stat__value {
    color: rgb(251 191 36);
  }
  .it-credit-stat--emerald .it-credit-stat__value {
    color: rgb(52 211 153);
  }
  .it-credit-stat--rose .it-credit-stat__value {
    color: rgb(251 113 133);
  }

  .it-credit-panel {
    border-radius: 1rem;
    border: 1px solid rgb(var(--rc-border) / 0.9);
    background: rgb(var(--rc-surface));
    padding: 1rem 1.1rem;
    box-shadow: 0 1px 2px rgb(15 23 42 / 0.04), 0 12px 32px -18px rgb(15 23 42 / 0.14);
  }
  @media (min-width: 640px) {
    .it-credit-panel {
      padding: 1.15rem 1.35rem;
    }
  }

  .it-credit-panel__head {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.5rem 0.75rem;
    margin-bottom: 0.85rem;
    padding-bottom: 0.85rem;
    border-bottom: 1px solid rgb(var(--rc-border) / 0.65);
  }
  .it-credit-panel__title {
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: rgb(var(--rc-page-fg));
  }
  @media (min-width: 640px) {
    .it-credit-panel__title {
      font-size: 1.05rem;

  }
  .it-credit-panel__desc {

    font-size: 0.75rem;

  }
  .it-credit-panel__badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 0.25rem 0.65rem;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    background: rgb(var(--rc-primary) / 0.12);
    color: rgb(var(--rc-page-fg));

  .it-credit-scroll-hint {

    align-items: center;
    gap: 0.35rem;
    margin-bottom: 0.5rem;
    font-size: 0.65rem;

    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: rgb(var(--rc-muted));
  }

  .it-credit-table-wrap {
    overflow: hidden;
    border-radius: 0.75rem;
    border: 1px solid rgb(var(--rc-border) / 0.85);
    -webkit-overflow-scrolling: touch;
  }
  .it-credit-table-wrap__scroll {
    overflow-x: auto;
  }

  .it-credit-table {
    width: 100%;
    font-size: 0.8125rem;
    border-collapse: collapse;
  }
  .it-credit-table thead {
    background: rgb(var(--rc-surface-2));
    color: rgb(var(--rc-muted));
  }
  .it-credit-table thead th {
    position: sticky;
    top: 0;
    z-index: 2;
    padding: 0.55rem 0.75rem;
    text-align: left;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
    box-shadow: 0 1px 0 rgb(var(--rc-border));
    background: rgb(var(--rc-surface-2));
  }
  .it-credit-table tbody td {
    padding: 0.65rem 0.75rem;
    vertical-align: middle;
  }
  .it-credit-table tbody tr {
    transition: background 0.12s ease;
  }
  .it-credit-table tbody tr:hover {
    background: rgb(var(--rc-surface-2) / 0.45);
  }
  .it-credit-table tbody tr + tr {
    border-top: 1px solid rgb(var(--rc-border) / 0.65);
  }

  .it-credit-amount--credit {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: rgb(251 191 36);
  }
  .it-credit-amount--paid {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: rgb(52 211 153);
  }
  .it-credit-amount--balance {
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    color: rgb(var(--rc-page-fg));
  }

  .it-credit-action-btn {
    display: inline-flex;
    height: 2.25rem;
    width: 2.25rem;
    align-items: center;
    justify-content: center;
    border-radius: 0.625rem;
    border: 1px solid rgb(var(--rc-border));
    background: rgb(var(--rc-surface-2));
    color: rgb(var(--rc-page-fg));
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.12s ease;
  }
  .it-credit-action-btn:hover {
    border-color: rgb(var(--rc-primary) / 0.4);
    background: rgb(var(--rc-primary) / 0.08);
    transform: translateY(-1px);
  }

  .it-credit-cards {
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
  }
  @media (min-width: 768px) {
    .it-credit-cards {
      display: none;
    }
  }

  .it-credit-row-card {
    border-radius: 0.85rem;
    border: 1px solid rgb(var(--rc-border) / 0.85);
    background: linear-gradient(180deg, rgb(var(--rc-surface)) 0%, rgb(var(--rc-surface-2) / 0.25) 100%);
    padding: 0.85rem 0.9rem;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .it-credit-row-card:active {
    border-color: rgb(var(--rc-primary) / 0.35);
  }
  .it-credit-row-card__top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .it-credit-row-card__name {
    font-size: 0.9rem;
    font-weight: 600;
    color: rgb(var(--rc-page-fg));
    line-height: 1.3;
  }
  .it-credit-row-card__sub {
    margin-top: 0.15rem;
    font-size: 0.7rem;
    color: rgb(var(--rc-muted));
  }
  .it-credit-row-card__metrics {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.5rem 0.65rem;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid rgb(var(--rc-border) / 0.55);
  }
  .it-credit-metric__label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgb(var(--rc-muted));
  }
  .it-credit-metric__value {
    margin-top: 0.1rem;
    font-size: 0.85rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .it-credit-table-desktop {
    display: none;
  }
  @media (min-width: 768px) {
    .it-credit-table-desktop {
      display: block;
    }
    .it-credit-scroll-hint {
      display: none;
    }
  }

  .it-credit-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2.5rem 1.25rem;
    border-radius: 0.85rem;
    border: 1px dashed rgb(var(--rc-border));
    background: rgb(var(--rc-surface-2) / 0.25);
  }
  .it-credit-empty__icon {
    display: flex;
    height: 3rem;
    width: 3rem;
    align-items: center;
    justify-content: center;
    border-radius: 1rem;
    background: rgb(var(--rc-surface-2));
    color: rgb(var(--rc-muted));
    margin-bottom: 0.85rem;
  }
  .it-credit-empty__title {
    font-size: 0.9rem;
    font-weight: 600;
    color: rgb(var(--rc-page-fg));
  }
  .it-credit-empty__text {
    margin-top: 0.35rem;
    max-width: 22rem;
    font-size: 0.8rem;
    line-height: 1.5;
    color: rgb(var(--rc-muted));
  }

  .it-credit-badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 0.2rem 0.5rem;
    font-size: 0.625rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .it-credit-badge--partial {
    background: rgb(245 158 11 / 0.15);
    color: rgb(180 83 9);
  }
  html[data-theme="dark"] .it-credit-badge--partial {
    color: rgb(253 230 138);
  }
  .it-credit-badge--paid {
    background: rgb(16 185 129 / 0.15);
    color: rgb(4 120 87);
  }
  html[data-theme="dark"] .it-credit-badge--paid {
    color: rgb(167 243 208);
  }
  .it-credit-badge--overdue {
    background: rgb(244 63 94 / 0.15);
    color: rgb(190 18 60);
  }
  html[data-theme="dark"] .it-credit-badge--overdue {
    color: rgb(254 205 211);
  }
  .it-credit-badge--upcoming {
    background: rgb(14 165 233 / 0.15);
    color: rgb(3 105 161);
  }
  html[data-theme="dark"] .it-credit-badge--upcoming {
    color: rgb(186 230 253);
  }
  .it-credit-badge--unpaid {
    background: rgb(100 116 139 / 0.15);
    color: rgb(71 85 105);
  }
  html[data-theme="dark"] .it-credit-badge--unpaid {
    color: rgb(203 213 225);
  }

  .it-credit-customer-header {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  @media (min-width: 640px) {
    .it-credit-customer-header {
      flex-direction: row;
      align-items: flex-start;
      justify-content: space-between;
    }
  }
  .it-credit-customer-header__actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .it-credit-tabs {
    display: inline-flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    padding: 0.25rem;
    border-radius: 0.75rem;
    border: 1px solid rgb(var(--rc-border) / 0.85);
    background: rgb(var(--rc-surface-2) / 0.5);
  }
  .it-credit-tab-btn {
    border: 0;
    border-radius: 0.5rem;
    padding: 0.45rem 0.75rem;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgb(var(--rc-muted));
    background: transparent;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
  }
  .it-credit-tab-btn:hover {
    color: rgb(var(--rc-page-fg));
    background: rgb(var(--rc-surface-2));
  }
  .it-credit-tab-btn--active {
    color: rgb(var(--rc-page-fg));
    background: rgb(var(--rc-surface));
    box-shadow: 0 1px 3px rgb(15 23 42 / 0.08);
  }
  html[data-theme="dark"] .it-credit-tab-btn--active {
    box-shadow: 0 1px 4px rgb(0 0 0 / 0.25);
  }

  @media (max-width: 639px) {
    .it-credit-panel__head .it-credit-tabs {
      width: 100%;
    }
    .it-credit-panel__head .it-credit-tab-btn {
      flex: 1 1 auto;
      text-align: center;
    }
  }

  .it-credit-pay-form {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.75rem;
  }
  @media (min-width: 640px) {
    .it-credit-pay-form {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .it-credit-pay-form__submit {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.65rem;
    }
  }

  @media print {
    .it-credit-filter,
    .it-credit-hub-header,
    .it-credit-stats,
    .it-credit-cards,
    .it-credit-scroll-hint {
      display: none !important;
    }
    .it-credit-table-desktop {
      display: block !important;
    }
  }
</style>
<script>
  (function () {
    function initCreditFilterPanels() {
      var panels = document.querySelectorAll(".it-credit-filter");
      if (!panels.length) return;
      var mq = window.matchMedia("(min-width: 768px)");
      function syncOpen() {
        panels.forEach(function (panel) {
          if (mq.matches) {
            panel.setAttribute("open", "");
            return;
          }
          var hasActive = panel.querySelector(".it-credit-pill--active");
          if (hasActive) {
            panel.setAttribute("open", "");
          }
        });
      }
      syncOpen();
      if (typeof mq.addEventListener === "function") {
        mq.addEventListener("change", syncOpen);
      } else if (typeof mq.addListener === "function") {
        mq.addListener(syncOpen);
      }
    }

    function initCreditDateModeSync() {
      var mode = document.getElementById("cp-filter-mode");
      if (!mode) return;
      var day = document.getElementById("cp-filter-single-day");
      var period = document.getElementById("cp-filter-period");
      var month = document.getElementById("cp-filter-month");
      var year = document.getElementById("cp-filter-year");

      function syncPanels() {
        var v = (mode.value || "single_day").toLowerCase();
        if (day) day.classList.toggle("hidden", v !== "single_day");
        if (period) period.classList.toggle("hidden", v !== "period");
        if (month) month.classList.toggle("hidden", v !== "month");
        if (year) year.classList.toggle("hidden", v !== "year");
      }

      syncPanels();
      mode.addEventListener("change", syncPanels);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        initCreditFilterPanels();
        initCreditDateModeSync();
      });
    } else {
      initCreditFilterPanels();
      initCreditDateModeSync();
    }
  })();
</script>
