<div class="shop-mgmt-catalog-actions flex flex-nowrap items-center justify-end gap-0.5">

  {% if is_active %}

    <a href="#shop-store-stock-in-item-{{ it.id }}" class="sa-stock-action-link sa-stock-action-link--icon sa-stock-action-link--emerald shop-mgmt-stock-jump" data-stock-jump="in" data-item-id="{{ it.id }}" title="Stock in" aria-label="Stock in">
      <svg class="sa-stock-action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
    </a>

    <a href="#shop-store-stock-out-item-{{ it.id }}" class="sa-stock-action-link sa-stock-action-link--icon sa-stock-action-link--amber shop-mgmt-stock-jump" data-stock-jump="out" data-item-id="{{ it.id }}" title="Stock out" aria-label="Stock out">
      <svg class="sa-stock-action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M7.5 12l4.5-4.5m0 0l4.5 4.5M12 3v13.5" /></svg>
    </a>

  {% endif %}

  <a href="{{ url_for('shop_stock_management', shop_id=shop.id, view=view, manage_item=it.id) }}#shop-store-item-{{ it.id }}" class="sa-stock-action-link sa-stock-action-link--icon sa-stock-action-link--edit" title="{% if row_open %}Close edit{% else %}Edit{% endif %}" aria-label="{% if row_open %}Close edit{% else %}Edit item{% endif %}">
    {% if row_open %}
      <svg class="sa-stock-action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
    {% else %}
      <svg class="sa-stock-action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z" /><path stroke-linecap="round" stroke-linejoin="round" d="M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" /></svg>
    {% endif %}
  </a>

  <form method="post" action="{{ url_for('shop_stock_management', shop_id=shop.id, view=view) }}" class="inline">
    <input type="hidden" name="action" value="toggle_shop_store_stock_item_status" />
    <input type="hidden" name="view" value="{{ view }}" /><input type="hidden" name="store_item_id" value="{{ it.id }}" />
    <button type="submit" class="sa-stock-action-link sa-stock-action-link--icon {% if is_active %}sa-stock-action-link--amber{% else %}sa-stock-action-link--emerald{% endif %}" title="{% if is_active %}Suspend{% else %}Activate{% endif %}" aria-label="{% if is_active %}Suspend item{% else %}Activate item{% endif %}">
      {% if is_active %}
        <svg class="sa-stock-action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5" /></svg>
      {% else %}
        <svg class="sa-stock-action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      {% endif %}
    </button>
  </form>

  <form method="post" action="{{ url_for('shop_stock_management', shop_id=shop.id, view=view) }}" class="inline" onsubmit="return confirm('Delete this shelf SKU?');">
    <input type="hidden" name="action" value="delete_shop_store_stock_item" />
    <input type="hidden" name="view" value="{{ view }}" /><input type="hidden" name="store_item_id" value="{{ it.id }}" />
    <button type="submit" class="sa-stock-action-link sa-stock-action-link--icon sa-stock-action-link--rose" title="Delete" aria-label="Delete item">
      <svg class="sa-stock-action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>
    </button>
  </form>

</div>
