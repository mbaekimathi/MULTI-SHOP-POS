{# WhatsApp share — PDF and M-Pesa link as separate actions #}
{% set wa_phone_default = (customer_phone or '')|trim %}
{% if wa_phone_default == '-' %}{% set wa_phone_default = '' %}{% endif %}
<div class="credit-note-wa-share-block no-print" data-credit-note-wa-block>
  <div class="credit-note-wa-share-block__phone">
    <label class="credit-note-wa-share-block__label" for="credit-note-wa-phone">WhatsApp to</label>
    <input
      id="credit-note-wa-phone"
      type="tel"
      inputmode="tel"
      autocomplete="tel"
      class="credit-note-wa-share-block__input"
      data-credit-note-wa-phone
      placeholder="e.g. 0712345678"
      value="{{ wa_phone_default }}"
      data-lpignore="true"
      data-form-type="other"
    />
  </div>
  <div class="credit-note-wa-share-block__actions">
    <button
      type="button"
      class="rev-btn rev-btn--whatsapp credit-note-wa-share credit-note-wa-share--pdf"
      data-credit-note-wa-pdf
      disabled
      aria-busy="true"
      aria-label="Send credit note PDF on WhatsApp"
    >
      <svg class="credit-note-wa-share__icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 2l5 5h-5V4zM8 13h8v2H8v-2zm0 4h5v2H8v-2z"/>
      </svg>
      Send PDF
    </button>
    <button
      type="button"
      class="rev-btn rev-btn--whatsapp credit-note-wa-share credit-note-wa-share--pay"
      data-credit-note-wa-pay
      aria-label="Send M-Pesa payment link on WhatsApp"
    >
      <svg class="credit-note-wa-share__icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Send payment link
    </button>
  </div>
  <p class="credit-note-wa-share-block__hint text-xs text-[rgb(var(--rc-muted))]">Step 1: send the credit note PDF. Step 2: send the M-Pesa payment link.</p>
  <p class="credit-note-wa-share-block__status hidden text-xs text-[rgb(var(--rc-muted))]" data-credit-note-wa-status role="status" aria-live="polite"></p>
</div>
