{# Accounts hub sidebar — accounts_nav: optional 'home'; salaries_nav: overview | register | advance | loan #}
{% set _accounts = accounts_nav|default('') %}
{% set _sal = salaries_nav|default('') %}
<p class="mb-1 px-1 text-[10px] font-bold uppercase tracking-[0.18em] text-[rgb(var(--rc-muted))]">Accounts</p>
<a
  href="{{ url_for('it_support_accounts') }}"
  class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if _accounts == 'home' %}bg-brand-500/15 text-brand-700 ring-1 ring-brand-400/30 dark:text-brand-200 dark:ring-brand-400/25{% else %}text-[rgb(var(--rc-page-fg))] hover:bg-[rgb(var(--rc-surface-2))]{% endif %}"
  {% if _accounts == 'home' %}aria-current="page"{% endif %}
>
  <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
  </svg>
  Accounts home
</a>
<p class="mb-1 mt-2 border-t border-[rgb(var(--rc-border))] px-1 pb-1 pt-3 text-[10px] font-bold uppercase tracking-[0.18em] text-[rgb(var(--rc-muted))]">Payroll</p>
<a
  href="{{ url_for('it_support_company_salaries') }}"
  class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if _sal == 'overview' %}bg-brand-500/15 text-brand-700 ring-1 ring-brand-400/30 dark:text-brand-200 dark:ring-brand-400/25{% else %}text-[rgb(var(--rc-page-fg))] hover:bg-[rgb(var(--rc-surface-2))]{% endif %}"
  {% if _sal == 'overview' %}aria-current="page"{% endif %}
>
  <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
  </svg>
  Payroll overview
</a>
<a
  href="{{ url_for('it_support_register_salary') }}"
  class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if _sal == 'register' %}bg-brand-500/15 text-brand-700 ring-1 ring-brand-400/30 dark:text-brand-200 dark:ring-brand-400/25{% else %}text-[rgb(var(--rc-page-fg))] hover:bg-[rgb(var(--rc-surface-2))]{% endif %}"
  {% if _sal == 'register' %}aria-current="page"{% endif %}
>
  <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
  </svg>
  Register salary
</a>
<a
  href="{{ url_for('it_support_register_advance') }}"
  class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if _sal == 'advance' %}bg-brand-500/15 text-brand-700 ring-1 ring-brand-400/30 dark:text-brand-200 dark:ring-brand-400/25{% else %}text-[rgb(var(--rc-page-fg))] hover:bg-[rgb(var(--rc-surface-2))]{% endif %}"
  {% if _sal == 'advance' %}aria-current="page"{% endif %}
>
  <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
  </svg>
  Register advance
</a>
<a
  href="{{ url_for('it_support_register_loan') }}"
  class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if _sal == 'loan' %}bg-brand-500/15 text-brand-700 ring-1 ring-brand-400/30 dark:text-brand-200 dark:ring-brand-400/25{% else %}text-[rgb(var(--rc-page-fg))] hover:bg-[rgb(var(--rc-surface-2))]{% endif %}"
  {% if _sal == 'loan' %}aria-current="page"{% endif %}
>
  <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
  </svg>
  Register loan
</a>
