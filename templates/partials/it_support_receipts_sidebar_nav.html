{# Set receipts_sidebar_active to 'withheld' on withheld-holds page. Receipts page uses main portal nav only. #}
{% set _rsa = receipts_sidebar_active|default('') %}
{% if company_pos_cart_mode_withhold|default(false) %}
  <a
    href="{{ url_for('it_support_withheld_holds') }}"
    class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if _rsa == 'withheld' %}bg-brand-500/15 text-brand-700 ring-1 ring-brand-400/30 dark:text-brand-200 dark:ring-brand-400/25{% else %}text-[rgb(var(--rc-page-fg))] hover:bg-[rgb(var(--rc-surface-2))]{% endif %}"
    {% if _rsa == 'withheld' %}aria-current="page"{% endif %}
  >
    <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    Withheld orders (hold)
  </a>
{% endif %}
