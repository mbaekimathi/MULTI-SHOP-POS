{% if can_register_items|default(false) %}
  <details
    id="shop-register-new-item"
    class="mt-6 scroll-mt-24 rounded-2xl border border-[rgb(var(--rc-border))] bg-[rgb(var(--rc-surface-2))] open:shadow-sm"
    {% if show_register_form|default(false) %}open{% endif %}
  >
    <summary class="flex cursor-pointer list-none items-center justify-between gap-3 px-5 py-4 text-sm font-semibold text-[rgb(var(--rc-page-fg))] marker:content-none [&::-webkit-details-marker]:hidden">
      <span class="inline-flex items-center gap-2">
        <svg class="h-5 w-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Register new item
      </span>
      <span class="text-xs font-medium uppercase tracking-wide text-[rgb(var(--rc-muted))]">Company catalog</span>
    </summary>
    <div class="border-t border-[rgb(var(--rc-border))] px-5 py-5">
      <p class="text-sm text-[rgb(var(--rc-muted))]">
        Adds the item to the company catalog. It will be <strong class="font-medium text-[rgb(var(--rc-page-fg))]">displayed for {{ shop.shop_name }}</strong> only;
        other branches start with display off until they turn it on.
      </p>
      <form
        method="post"
        action="{{ url_for('shop_register_item', shop_id=shop.id) }}"
        enctype="multipart/form-data"
        class="mt-5 space-y-5"
      >
        <div class="grid gap-5 md:grid-cols-2">
          <div>
            <label for="shop-reg-category" class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-[rgb(var(--rc-muted))]">Item category</label>
            <input
              id="shop-reg-category"
              name="category"
              required
              class="w-full rounded-xl border border-[rgb(var(--rc-border))] bg-[rgb(var(--rc-surface))] px-4 py-3 text-sm text-[rgb(var(--rc-page-fg))] outline-none uppercase"
              placeholder="E.G. BEVERAGES"
            />
          </div>
          <div>
            <label for="shop-reg-name" class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-[rgb(var(--rc-muted))]">Item name</label>
            <input
              id="shop-reg-name"
              name="name"
              required
              class="w-full rounded-xl border border-[rgb(var(--rc-border))] bg-[rgb(var(--rc-surface))] px-4 py-3 text-sm text-[rgb(var(--rc-page-fg))] outline-none uppercase"
              placeholder="E.G. COCA COLA 500ML"
            />
          </div>
        </div>
        <div>
          <label for="shop-reg-description" class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-[rgb(var(--rc-muted))]">Item description</label>
          <textarea
            id="shop-reg-description"
            name="description"
            rows="3"
            class="w-full rounded-xl border border-[rgb(var(--rc-border))] bg-[rgb(var(--rc-surface))] px-4 py-3 text-sm text-[rgb(var(--rc-page-fg))] outline-none uppercase"
            placeholder="OPTIONAL DESCRIPTION"
          ></textarea>
        </div>
        <div class="grid gap-5 md:grid-cols-2">
          <div>
            <label for="shop-reg-price" class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-[rgb(var(--rc-muted))]">Original selling price</label>
            <input
              id="shop-reg-price"
              name="price"
              type="number"
              min="0"
              step="0.01"
              required
              class="w-full rounded-xl border border-[rgb(var(--rc-border))] bg-[rgb(var(--rc-surface))] px-4 py-3 text-sm text-[rgb(var(--rc-page-fg))] outline-none"
              placeholder="0.00"
            />
          </div>
          <div>
            <label for="shop-reg-selling-price" class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-[rgb(var(--rc-muted))]">Selling price (POS)</label>
            <input
              id="shop-reg-selling-price"
              name="selling_price"
              type="number"
              min="0"
              step="0.01"
              class="w-full rounded-xl border border-[rgb(var(--rc-border))] bg-[rgb(var(--rc-surface))] px-4 py-3 text-sm text-[rgb(var(--rc-page-fg))] outline-none"
              placeholder="Same as original if empty"
            />
          </div>
        </div>
        <div>
          <label for="shop-reg-image" class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-[rgb(var(--rc-muted))]">Upload item image (optional)</label>
          <input
            id="shop-reg-image"
            name="image"
            type="file"
            accept="image/png,image/jpeg,image/jpg,image/gif,image/webp"
            class="block w-full text-sm text-[rgb(var(--rc-muted))]"
          />
        </div>
        <div class="flex flex-wrap gap-3 pt-1">
          <button type="submit" class="btn-rc btn-rc-primary px-6 py-2.5 text-sm">
            Register item
          </button>
        </div>
      </form>
    </div>
  </details>
{% endif %}
