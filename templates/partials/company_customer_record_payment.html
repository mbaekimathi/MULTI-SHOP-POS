{# Company-wide credit payment (FIFO across shops) #}
<section id="shop-record-payment" class="shop-cust-pay-card no-print" aria-labelledby="company-record-payment-heading">
  <div class="shop-cust-pay-card__accent" aria-hidden="true"></div>
  <div class="shop-cust-pay-card__inner">
    <div class="shop-cust-pay-card__head">
      <div class="shop-cust-pay-card__icon" aria-hidden="true">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <div class="min-w-0 flex-1">
        <h3 id="company-record-payment-heading" class="shop-cust-pay-card__title">Update payment</h3>
        <p class="shop-cust-pay-card__desc">Amount is applied FIFO to the oldest unpaid credit sales across all shops.</p>
      </div>
      <div class="shop-cust-pay-card__due">
        <span class="shop-cust-pay-card__due-label">Balance due</span>
        <span class="shop-cust-pay-card__due-value">{{ "%.2f"|format(account_balance_due or 0) }}</span>
      </div>
    </div>

    <form method="post" action="{{ url_for('company_credit_payments_pay') }}" class="shop-cust-pay-card__form">
      <input type="hidden" name="customer_name" value="{{ customer_name }}" />
      <input type="hidden" name="customer_phone" value="{{ customer_phone }}" />
      <input type="hidden" name="back_shop_id" value="{{ back_shop_id or '' }}" />
      <div class="shop-cust-pay-card__fields shop-cust-pay-card__fields--company">
        <div class="shop-cust-pay-card__field">
          <label for="company-pay-amount">Amount paid</label>
          <input id="company-pay-amount" name="amount" type="number" step="0.01" min="0" required placeholder="0.00" />
        </div>
        <div class="shop-cust-pay-card__field">
          <label for="company-pay-method">Payment method</label>
          <select id="company-pay-method" name="payment_method" required>
            <option value="">Select method</option>
            <option value="cash">Cash</option>
            <option value="mpesa">Mpesa</option>
            <option value="bank">Bank</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="shop-cust-pay-card__submit">
          <button type="submit" class="shop-cust-pay-card__btn">Update payment</button>
        </div>
      </div>
    </form>
  </div>
</section>
