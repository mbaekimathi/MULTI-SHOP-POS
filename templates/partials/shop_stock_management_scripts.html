<script>
  window.shopStockWorkspaceSettings = {{ (stock_workspace_settings or {})|tojson }};
  window.shopStockWsRequired = function (key) {
    var s = window.shopStockWorkspaceSettings || {};
    return !!s[key];
  };
</script>
<script>
  window.ShopStockSubmitConfirm = (function () {
    var modal, titleEl, subtitleEl, metaEl, headEl, bodyEl, okBtn, pendingForm = null;

    function esc(text) {
      var el = document.createElement("div");
      el.textContent = text == null ? "" : String(text);
      return el.innerHTML;
    }

    function close() {
      if (!modal) return;
      modal.classList.add("hidden");
      pendingForm = null;
    }

    function confirmSubmit() {
      if (!pendingForm) return;
      pendingForm.setAttribute("data-stock-confirmed", "1");
      if (typeof pendingForm.requestSubmit === "function") pendingForm.requestSubmit();
      else pendingForm.submit();
      close();
    }

    function show(opts) {
      if (!modal) return;
      titleEl.textContent = opts.title || "Confirm submission";
      subtitleEl.textContent = opts.subtitle || "Review the lines below before updating stock.";
      metaEl.textContent = String((opts.rows || []).length) + " line(s)";

      var cols = opts.columns || [];
      var headHtml = "<tr>";
      cols.forEach(function (col) {
        var align = col.align === "right" ? " text-right" : " text-left";
        headHtml += '<th class="' + align.trim() + '">' + esc(col.label || col) + "</th>";
      });
      headHtml += "</tr>";
      headEl.innerHTML = headHtml;

      var bodyHtml = "";
      (opts.rows || []).forEach(function (row) {
        bodyHtml += "<tr>";
        row.forEach(function (cell, idx) {
          var align = cols[idx] && cols[idx].align === "right" ? " text-right tabular-nums" : "";
          var cls = idx === (row.length - 2) && cols[idx] && cols[idx].key === "qty" ? " text-right tabular-nums font-semibold" : align;
          if (cols[idx] && cols[idx].key === "item") cls = " font-semibold";
          if (cols[idx] && cols[idx].key === "type") cls = " text-[rgb(var(--rc-muted))]";
          bodyHtml += '<td class="' + cls.trim() + '">' + esc(cell) + "</td>";
        });
        bodyHtml += "</tr>";
      });
      bodyEl.innerHTML = bodyHtml;

      okBtn.textContent = opts.confirmLabel || "Confirm & submit";
      okBtn.className = "btn-rc px-4 py-2 text-sm " + (opts.confirmClass || "btn-rc-primary");
      pendingForm = opts.form || null;
      modal.classList.remove("hidden");
      try { okBtn.focus(); } catch (_e) {}
    }

    function init() {
      modal = document.getElementById("js-stock-submit-confirm-modal");
      if (!modal) return;
      titleEl = document.getElementById("js-stock-submit-confirm-title");
      subtitleEl = document.getElementById("js-stock-submit-confirm-subtitle");
      metaEl = document.getElementById("js-stock-submit-confirm-meta");
      headEl = document.getElementById("js-stock-submit-confirm-head");
      bodyEl = document.getElementById("js-stock-submit-confirm-body");
      okBtn = document.getElementById("js-stock-submit-confirm-ok");
      var cancelBtn = document.getElementById("js-stock-submit-confirm-cancel");
      var closeBtn = document.getElementById("js-stock-submit-confirm-close");

      okBtn.addEventListener("click", confirmSubmit);
      if (cancelBtn) cancelBtn.addEventListener("click", close);
      if (closeBtn) closeBtn.addEventListener("click", close);
      modal.querySelectorAll("[data-stock-confirm-dismiss]").forEach(function (el) {
        el.addEventListener("click", close);
      });
      document.addEventListener("keydown", function (ev) {
        if (ev.key === "Escape" && modal && !modal.classList.contains("hidden")) close();
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }

    return { show: show, close: close };
  })();

  window.shopStockFormConfirmed = function (form) {
    return form && form.getAttribute("data-stock-confirmed") === "1";
  };

  window.shopStockClearConfirmed = function (form) {
    if (form) form.removeAttribute("data-stock-confirmed");
  };

  window.shopStockShowSubmitConfirm = function (form, opts) {
    if (!form || !window.ShopStockSubmitConfirm) return;
    window.ShopStockSubmitConfirm.show(Object.assign({ form: form }, opts));
  };
</script>

<script>
  (function () {
    function wireStoreStockSearch(searchInput, countEl, formEl) {
      if (!searchInput || !formEl) return;
      function syncSearch() {
        var q = (searchInput.value || "").trim().toLowerCase();
        var visible = 0;
        var visibleByCategory = {};
        formEl.querySelectorAll(".shop-store-row").forEach(function (row) {
          var hay = (row.getAttribute("data-stock-search") || "").toLowerCase();
          var show = !q || hay.indexOf(q) !== -1;
          row.classList.toggle("hidden", !show);
          if (show) {
            visible += 1;
            var catKey = String(row.getAttribute("data-stock-category") || "");
            if (catKey) visibleByCategory[catKey] = true;
          }
        });
        formEl.querySelectorAll(".shop-store-cat-row").forEach(function (catRow) {
          var catKey = String(catRow.getAttribute("data-cat") || "");
          catRow.classList.toggle("hidden", !!q && !visibleByCategory[catKey]);
        });
        if (countEl) countEl.textContent = String(visible);
      }
      searchInput.addEventListener("input", syncSearch);
      syncSearch();
    }

    wireStoreStockSearch(
      document.getElementById("shop-store-in-search"),
      document.getElementById("shop-store-in-visible-count"),
      document.getElementById("shop-store-bulk-form-in")
    );
    wireStoreStockSearch(
      document.getElementById("shop-store-out-search"),
      document.getElementById("shop-store-out-visible-count"),
      document.getElementById("shop-store-bulk-form-out")
    );
  })();
</script>

<script>
  (function () {
    var formIn = document.getElementById("shop-store-bulk-form-in");
    if (!formIn) return;

    var applyPhone = document.getElementById("shop-store-apply-phone");
    var applyName = document.getElementById("shop-store-apply-name");
    var applyPayment = document.getElementById("shop-store-apply-payment");
    var applyNote = document.getElementById("shop-store-apply-note");
    var applyHint = document.getElementById("shop-store-apply-hint");
    var copyBtn = document.getElementById("shop-store-copy-in-rows");
    var feedback = document.getElementById("shop-store-copy-in-feedback");
    var sellerLookupUrl = {{ url_for('seller_lookup')|tojson }};

    function normalizePhoneValue(raw) {
      var val = String(raw || "").trim();
      if (window.KenyaPhone && typeof window.KenyaPhone.normalize === "function") {
        return window.KenyaPhone.normalize(val) || val.replace(/\s+/g, "");
      }
      if (val.indexOf("+254") === 0) val = "254" + val.slice(4);
      val = val.replace(/\s+/g, "");
      var digits = val.replace(/\D/g, "");
      if (digits.indexOf("254") === 0 && digits.length >= 12) return digits.slice(0, 12);
      if (digits.charAt(0) === "0" && digits.length >= 10) return "254" + digits.slice(1, 11);
      if (digits.length === 9 && (digits.charAt(0) === "7" || digits.charAt(0) === "1")) return "254" + digits;
      return val;
    }

    function sellerLookup(phone, cb) {
      var p = normalizePhoneValue(phone);
      var digits = p.replace(/\D/g, "");
      if (!p) return cb("empty", null, p);
      if (digits.length < 10) return cb("short", null, p);
      var valid10 = /^((07|01)\d{8})$/.test(digits);
      var valid12 = /^(254\d{9})$/.test(digits);
      if (!valid10 && !valid12) return cb("badformat", null, p);

      var fd = new FormData();
      fd.append("seller_phone", p);
      fetch(sellerLookupUrl, { method: "POST", body: fd })
        .then(function (r) { return r.json(); })
        .then(function (data) { cb("ok", data, p); })
        .catch(function () { cb("err", null, p); });
    }

    function bindSellerLookup(phoneEl, nameEl, hintEl) {
      if (!phoneEl || !nameEl) return;
      var timer = null;
      phoneEl.addEventListener("input", function () {
        if (timer) clearTimeout(timer);
        timer = setTimeout(function () {
          sellerLookup(phoneEl.value, function (state, data, normalizedPhone) {
            if (phoneEl.value !== normalizedPhone) phoneEl.value = normalizedPhone;
            if (!hintEl) return;
            if (state === "empty") { hintEl.textContent = ""; return; }
            if (state === "short") { hintEl.textContent = "Continue typing seller phone..."; return; }
            if (state === "badformat") { hintEl.textContent = "Use 07... or 01... (10 digits) or 254... (12 digits)."; return; }
            if (state === "ok" && data && data.ok && data.registered && data.seller) {
              nameEl.value = String(data.seller.seller_name || "").toUpperCase();
              hintEl.textContent = "Registered seller found.";
              return;
            }
            if (state === "ok") {
              hintEl.textContent = "New phone - enter seller name; supplier registers on submit.";
              return;
            }
            hintEl.textContent = "";
          });
        }, 220);
      });
    }

    bindSellerLookup(applyPhone, applyName, applyHint);

    formIn.querySelectorAll(".shop-store-row-in").forEach(function (row) {
      var id = row.getAttribute("data-item-id");
      if (!id) return;
      var phone = row.querySelector('[data-seller-phone="' + id + '"]');
      var name = row.querySelector('[data-seller-name="' + id + '"]');
      var hint = row.querySelector('[data-seller-hint="' + id + '"]');
      bindSellerLookup(phone, name, hint);
    });

    if (copyBtn) {
      copyBtn.addEventListener("click", function () {
        var pv = normalizePhoneValue(applyPhone && applyPhone.value);
        var nv = String((applyName && applyName.value) || "").trim().toUpperCase();
        var payRaw = String((applyPayment && applyPayment.value) || "").trim().toLowerCase();
        var payOk = payRaw === "pending_payment" || payRaw === "partially_paid" || payRaw === "paid";
        var noteVal = String((applyNote && applyNote.value) || "").trim().toUpperCase();
        if (!pv || !nv || !payOk) {
          if (feedback) {
            feedback.textContent =
              "Fill supplier phone, seller name, and payment above before copying to rows.";
          }
          return;
        }
        var copied = 0;

        formIn.querySelectorAll(".shop-store-row-in").forEach(function (row) {
          var id = row.getAttribute("data-item-id");
          if (!id) return;
          var qtyEl = row.querySelector('input[name="in_qty_' + id + '"]');
          var qty = parseFloat(String((qtyEl && qtyEl.value) || "").replace(",", "."));
          if (!isFinite(qty) || !(qty > 0)) return;
          copied += 1;
          var pEl = row.querySelector('input[name="in_seller_phone_' + id + '"]');
          var nEl = row.querySelector('input[name="in_place_' + id + '"]');
          var payEl = row.querySelector('select[name="in_payment_status_' + id + '"]');
          var noteEl = row.querySelector('input[name="in_note_' + id + '"]');
          var hintEl = row.querySelector('[data-seller-hint="' + id + '"]');
          if (pEl) pEl.value = pv;
          if (nEl) nEl.value = nv;
          if (payEl && payOk) payEl.value = payRaw;
          if (noteEl && noteVal) noteEl.value = noteVal;
          if (hintEl) hintEl.textContent = "";
        });

        if (!feedback) return;
        if (!copied) {
          feedback.textContent = "No rows updated - enter qty on target lines, then copy again.";
        } else {
          feedback.textContent = "Copied supplier phone, seller, and payment to " + copied + " row(s) with quantity.";
        }
      });
    }

    formIn.addEventListener("submit", function (ev) {
      var allowedPayVals = { pending_payment: 1, partially_paid: 1, paid: 1 };
      var problems = [];
      var firstBad = null;
      formIn.querySelectorAll(".shop-store-row-in").forEach(function (row) {
        var id = row.getAttribute("data-item-id");
        if (!id) return;
        var label = "Item #" + id;
        var qIn = row.querySelector('input[name="in_qty_' + id + '"]');
        var bp = row.querySelector('input[name="in_buying_price_' + id + '"]');
        var place = row.querySelector('input[name="in_place_' + id + '"]');
        var phone = row.querySelector('input[name="in_seller_phone_' + id + '"]');
        var pay = row.querySelector('select[name="in_payment_status_' + id + '"]');
        var note = row.querySelector('input[name="in_note_' + id + '"]');
        var qtyStr = String((qIn && qIn.value) || "").trim();
        var qPos;
        if (!qtyStr) qPos = null;
        else {
          var n = parseFloat(qtyStr.replace(",", "."));
          if (!isFinite(n) || !(n > 0)) qPos = false;
          else qPos = n;
        }
        var bpS = (bp && bp.value || "").trim();
        var plS = (place && place.value || "").trim();
        var phS = (phone && phone.value || "").trim();
        var payS = (pay && pay.value || "").trim().toLowerCase();
        var payOk = !!allowedPayVals[payS];
        var noteS = (note && note.value || "").trim();
        var otherTouched = !!(bpS || plS || phS || payOk || noteS);

        if (typeof qPos === "number") {
          if (!bpS) {
            problems.push(label + ": buying price is required with quantity.");
            firstBad = firstBad || row;
          }
          if (!phS) {
            problems.push(label + ": supplier phone is required with quantity.");
            firstBad = firstBad || row;
          }
          if (!plS) {
            problems.push(label + ": seller name is required with quantity.");
            firstBad = firstBad || row;
          }
          if (!payOk) {
            problems.push(label + ": select payment (Not paid, Partially paid, or Paid).");
            firstBad = firstBad || row;
          }
        } else if (qPos === false) {
          problems.push(label + ": enter a valid positive quantity or clear this row.");
          firstBad = firstBad || row;
        } else if (otherTouched) {
          problems.push(label + ": enter quantity or clear buying price, seller, phone, and payment.");
          firstBad = firstBad || row;
        }
      });
      if (problems.length) {
        ev.preventDefault();
        window.alert(problems.slice(0, 6).join("\n") + (problems.length > 6 ? "\n..." : ""));
        if (firstBad) {
          try {
            firstBad.scrollIntoView({ block: "center", behavior: "smooth" });
          } catch (_e) {}
        }
      }
    });
  })();
</script>

<script>
  (function () {
    var formOut = document.getElementById("shop-store-bulk-form-out");
    if (!formOut) return;
    var applyReason = document.getElementById("shop-store-out-apply-reason");
    var applyRefunded = document.getElementById("shop-store-out-apply-refunded");
    var applyNote = document.getElementById("shop-store-out-apply-note");
    var copyBtn = document.getElementById("shop-store-copy-out-rows");
    var feedback = document.getElementById("shop-store-copy-out-feedback");

    function syncRefundRow(itemId) {
      var sel = formOut.querySelector('[name="out_refunded_' + itemId + '"]');
      var amt = formOut.querySelector('[name="out_refund_amount_' + itemId + '"]');
      if (!sel || !amt) return;
      var yes = sel.value === "yes";
      amt.disabled = !yes;
      if (!yes) amt.value = "";
    }

    formOut.querySelectorAll(".shop-store-out-refunded").forEach(function (sel) {
      var id = sel.getAttribute("data-item-id");
      if (id) syncRefundRow(id);
      sel.addEventListener("change", function () {
        var rowId = sel.getAttribute("data-item-id");
        if (rowId) syncRefundRow(rowId);
      });
    });

    if (!copyBtn) return;
    copyBtn.addEventListener("click", function () {
      var reason = String((applyReason && applyReason.value) || "").trim().toLowerCase();
      var refunded = String((applyRefunded && applyRefunded.value) || "no").trim().toLowerCase();
      var noteVal = String((applyNote && applyNote.value) || "").trim().toUpperCase();
      var allowedReason = { "return": 1, "waste": 1, "display": 1 };
      if (!allowedReason[reason]) {
        if (feedback) feedback.textContent = "Choose Reason first (Return, Waste, or Display).";
        return;
      }

      var copied = 0;
      formOut.querySelectorAll(".shop-store-row-out").forEach(function (row) {
        var id = row.getAttribute("data-item-id");
        if (!id) return;
        var qtyEl = row.querySelector('input[name="out_qty_' + id + '"]');
        var qty = parseFloat(String((qtyEl && qtyEl.value) || "").replace(",", "."));
        if (!isFinite(qty) || !(qty > 0)) return;
        copied += 1;
        var reasonEl = row.querySelector('select[name="out_reason_' + id + '"]');
        var refundedEl = row.querySelector('select[name="out_refunded_' + id + '"]');
        var noteEl = row.querySelector('input[name="out_note_' + id + '"]');
        if (reasonEl) reasonEl.value = reason;
        if (refundedEl) refundedEl.value = refunded === "yes" ? "yes" : "no";
        if (noteEl && noteVal) noteEl.value = noteVal;
        syncRefundRow(id);
      });

      if (!feedback) return;
      feedback.textContent = copied
        ? "Copied reason/refund/note to " + copied + " row(s) with quantity."
        : "No rows updated - enter qty out on target lines, then copy again.";
    });
  })();
</script>

<script>
  (function () {
    var input = document.getElementById("js-stock-item-search");
    var countEl = document.getElementById("js-stock-visible-count");
    var scope = document.getElementById("stk-workspace");
    var rows = scope
      ? Array.prototype.slice.call(scope.querySelectorAll(".js-stock-row"))
      : Array.prototype.slice.call(document.querySelectorAll(".js-stock-row"));
    if (!input || !countEl || !rows.length) return;

    function sync() {
      var q = (input.value || "").trim().toLowerCase();
      var n = 0;
      var visibleByCat = {};
      rows.forEach(function (row) {
        var hay = (row.getAttribute("data-stock-search") || "").toLowerCase();
        var show = !q || hay.indexOf(q) !== -1;
        row.style.display = show ? "" : "none";
        if (show) {
          n += 1;
          var catKey = String(row.getAttribute("data-stock-category") || "");
          if (catKey) visibleByCat[catKey] = true;
        }
      });
      (scope || document).querySelectorAll(".js-stock-cat-row").forEach(function (catRow) {
        var catKey = String(catRow.getAttribute("data-cat") || "");
        catRow.style.display = !q || visibleByCat[catKey] ? "" : "none";
      });
      countEl.textContent = String(n);
    }

    input.addEventListener("input", sync);
    sync();
  })();
</script>

<script>
  (function () {
    var form = document.getElementById("js-batch-request-stock-form");
    if (!form) return;
    var sourceSel = document.getElementById("batch-request-source");
    var heading = document.getElementById("js-source-stock-heading");
    var sessionHeading = document.getElementById("js-session-shop-stock-heading");
    var hint = document.getElementById("js-source-stock-hint");
    var sourceStockUrl = String(form.getAttribute("data-source-stock-url") || "");
    var sourceCells = Array.prototype.slice.call(form.querySelectorAll(".js-source-stock-cell"));
    var sessionShopLabel = sessionHeading ? String(sessionHeading.textContent || "Shop").trim() : "Shop";
    var showNotesToggle = document.getElementById("js-request-stock-show-notes");
    var sharedNoteWrap = form.querySelector(".js-request-stock-shared-note-wrap");
    var sharedNoteInput = document.getElementById("js-request-stock-batch-note");

    function notesRequiredBySettings() {
      return window.shopStockWsRequired("require_request_stock_notes");
    }

    function notesEnabled() {
      if (notesRequiredBySettings()) return true;
      return !!(showNotesToggle && showNotesToggle.checked);
    }

    function setOptColVisible(el, show) {
      if (!el) return;
      el.classList.toggle("hidden", !show);
    }

    function syncRequestCatColspan() {
      var n = notesEnabled() ? 5 : 4;
      form.querySelectorAll(".js-request-stock-cat-row td").forEach(function (td) {
        td.colSpan = n;
      });
    }

    function syncNotesVisible(on) {
      form.querySelectorAll(".js-request-stock-note-head, .js-request-stock-note-cell").forEach(function (el) {
        setOptColVisible(el, on);
      });
      if (sharedNoteWrap) sharedNoteWrap.classList.toggle("hidden", !on);
      if (!on) {
        form.querySelectorAll('input[name^="note_"]').forEach(function (el) { el.value = ""; });
        if (sharedNoteInput) sharedNoteInput.value = "";
      }
      syncRequestCatColspan();
    }

    if (showNotesToggle) {
      showNotesToggle.addEventListener("change", function () {
        if (notesRequiredBySettings()) return;
        syncNotesVisible(showNotesToggle.checked);
      });
      if (notesRequiredBySettings()) {
        showNotesToggle.checked = true;
        syncNotesVisible(true);
      } else {
        syncNotesVisible(false);
      }
    } else if (notesRequiredBySettings()) {
      syncNotesVisible(true);
    }

    function currentSourceLabel() {
      if (heading && heading.textContent) return String(heading.textContent).trim();
      if (!sourceSel) return "Source";
      var opt = sourceSel.options[sourceSel.selectedIndex];
      return opt ? String(opt.textContent || "Source").trim() : "Source";
    }

    function selectedSourceValue() {
      return sourceSel ? String(sourceSel.value || "company") : "company";
    }

    function applySourceLabel(label) {
      var text = String(label || "Source").trim() || "Source";
      if (heading) heading.textContent = text;
      if (hint) {
        hint.textContent = "Requests are limited by stock at " + text + " (first stock column). "
          + sessionShopLabel + " shows this shop's current shelf stock.";
      }
      sourceCells.forEach(function (cell) {
        cell.setAttribute("title", text + " stock");
      });
    }

    function refreshSourceStock() {
      if (!sourceStockUrl) return;
      var src = selectedSourceValue();
      fetch(sourceStockUrl + "?batch_request_source=" + encodeURIComponent(src), { credentials: "same-origin" })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (!data || !data.ok) return;
          if (data.label) applySourceLabel(data.label);
          var map = data.stock_by_item_id || {};
          sourceCells.forEach(function (cell) {
            var iid = String(cell.getAttribute("data-item-id") || "");
            if (Object.prototype.hasOwnProperty.call(map, iid)) {
              cell.textContent = map[iid];
            }
          });
        })
        .catch(function () {});
    }

    function syncSourceUi() {
      if (sourceSel) {
        var opt = sourceSel.options[sourceSel.selectedIndex];
        applySourceLabel(opt ? String(opt.textContent || "").trim() : "Source");
      }
      refreshSourceStock();
    }

    if (sourceSel) sourceSel.addEventListener("change", syncSourceUi);
    syncSourceUi();

    form.addEventListener("submit", function (ev) {
      if (shopStockFormConfirmed(form)) {
        shopStockClearConfirmed(form);
        return;
      }
      var issues = [];
      var rows = [];
      var sourceLabel = currentSourceLabel();
      var sharedNoteVal = String((sharedNoteInput && sharedNoteInput.value) || "").trim();
      form.querySelectorAll(".js-stock-row").forEach(function (row) {
        var qtyInput = row.querySelector(".js-request-stock-qty");
        if (!qtyInput) return;
        var raw = String(qtyInput.value || "").trim();
        if (!raw) return;
        var qty = parseFloat(raw.replace(",", "."));
        if (!isFinite(qty) || !(qty > 0)) {
          issues.push("Enter valid positive quantity for " + (row.querySelector("td") || row).textContent.trim() + ".");
          return;

<script>
  (function () {
    var form = document.getElementById("stk-workspace");
    if (!form) return;

    var applyPhone = document.getElementById("js-apply-all-phone");
    var applyName = document.getElementById("js-apply-all-name");
    var applyPayment = document.getElementById("js-apply-all-payment");
    var applyNote = document.getElementById("js-apply-all-note");
    var showNotesToggle = document.getElementById("js-manual-in-show-notes");
    var bulkSupplierWrap = document.getElementById("js-manual-in-bulk-supplier-wrap");
    var bulkNoteWrap = document.getElementById("js-manual-in-bulk-note-wrap");
    var copyBtn = document.getElementById("js-apply-all-copy-rows");
    var feedback = document.getElementById("js-apply-all-copy-feedback");
    var applyHint = document.getElementById("js-apply-all-hint");
    var sellerLookupUrl = {{ url_for('seller_lookup')|tojson }};

    function notesRequiredBySettingsIn() {
      return window.shopStockWsRequired("require_manual_in_notes");
    }

    function supplierEnabled() {
      return true;
    }

    function notesEnabledIn() {
      if (notesRequiredBySettingsIn()) return true;
      return !!(showNotesToggle && showNotesToggle.checked);
    }

    function setInOptColVisible(el, show) {
      if (!el) return;
      el.classList.toggle("hidden", !show);
    }

    function syncManualInCatColspan() {
      var n = 5;
      if (supplierEnabled()) n += 2;
      if (notesEnabledIn()) n += 1;
      form.querySelectorAll(".js-manual-in-cat-row td").forEach(function (td) {
        td.colSpan = n;
      });
    }

    function syncSupplierVisible(on) {
      form.querySelectorAll(".js-manual-in-phone-head, .js-manual-in-phone-cell, .js-manual-in-seller-head, .js-manual-in-seller-cell").forEach(function (el) {
        setInOptColVisible(el, on);
      });
      if (bulkSupplierWrap) bulkSupplierWrap.classList.toggle("hidden", !on);
      if (!on) {
        form.querySelectorAll('input[name^="seller_phone_"], input[name^="seller_name_"]').forEach(function (el) { el.value = ""; });
        form.querySelectorAll(".js-seller-hint").forEach(function (el) { el.textContent = ""; });
        if (applyPhone) applyPhone.value = "";
        if (applyName) applyName.value = "";
        if (applyHint) applyHint.textContent = "";
      }
      syncManualInCatColspan();
    }

    function syncManualInNotesVisible(on) {
      form.querySelectorAll(".js-manual-in-note-head, .js-manual-in-note-cell").forEach(function (el) {
        setInOptColVisible(el, on);
      });
      if (bulkNoteWrap) bulkNoteWrap.classList.toggle("hidden", !on);
      if (!on) {
        form.querySelectorAll('input[name^="note_"]').forEach(function (el) { el.value = ""; });
        if (applyNote) applyNote.value = "";
      }
      syncManualInCatColspan();
    }

    syncSupplierVisible(true);

    if (showNotesToggle) {
      showNotesToggle.addEventListener("change", function () {
        if (notesRequiredBySettingsIn()) return;
        syncManualInNotesVisible(showNotesToggle.checked);
      });
      if (notesRequiredBySettingsIn()) {
        showNotesToggle.checked = true;
        syncManualInNotesVisible(true);
      } else {
        syncManualInNotesVisible(false);
      }
    } else if (notesRequiredBySettingsIn()) {
      syncManualInNotesVisible(true);
    }

    function normalizePhoneValue(raw) {
      var val = String(raw || "").trim();
      if (window.KenyaPhone && typeof window.KenyaPhone.normalize === "function") {
        return window.KenyaPhone.normalize(val) || val.replace(/\s+/g, "");
      }
      if (val.indexOf("+254") === 0) val = "254" + val.slice(4);
      val = val.replace(/\s+/g, "");
      var digits = val.replace(/\D/g, "");
      if (digits.indexOf("254") === 0 && digits.length >= 12) return digits.slice(0, 12);
      if (digits.charAt(0) === "0" && digits.length >= 10) return "254" + digits.slice(1, 11);
      if (digits.length === 9 && (digits.charAt(0) === "7" || digits.charAt(0) === "1")) return "254" + digits;
      return val;
    }

    function lookupSeller(phone, cb) {
      var p = normalizePhoneValue(phone);
      var digits = p.replace(/\D/g, "");
      if (!p) return cb("empty", null, p);
      if (digits.length < 10) return cb("short", null, p);
      var valid10 = /^((07|01)\d{8})$/.test(digits);
      var valid12 = /^(254\d{9})$/.test(digits);
      if (!valid10 && !valid12) return cb("badformat", null, p);
      var fd = new FormData();
      fd.append("seller_phone", p);
      fetch(sellerLookupUrl, { method: "POST", body: fd })
        .then(function (r) { return r.json(); })
        .then(function (data) { cb("ok", data, p); })
        .catch(function () { cb("err", null, p); });
    }

    function bindSellerLookup(phoneEl, nameEl, hintEl) {
      if (!phoneEl || !nameEl) return;
      var timer = null;
      phoneEl.addEventListener("input", function () {
        if (timer) clearTimeout(timer);
        timer = setTimeout(function () {
          lookupSeller(phoneEl.value, function (state, data, normalizedPhone) {
            if (phoneEl.value !== normalizedPhone) phoneEl.value = normalizedPhone;
            if (!hintEl) return;
            if (state === "empty") { hintEl.textContent = ""; return; }
            if (state === "short") { hintEl.textContent = "Continue typing seller phone..."; return; }
            if (state === "badformat") { hintEl.textContent = "Use 07... or 01... (10 digits) or 254... (12 digits)."; return; }
            if (state === "ok" && data && data.ok && data.registered && data.seller) {
              nameEl.value = String(data.seller.seller_name || "").toUpperCase();
              hintEl.textContent = "Registered seller found.";
            } else if (state === "ok") {
              hintEl.textContent = "New phone - enter seller name; supplier registers on submit.";
            } else {
              hintEl.textContent = "";
            }
          });
        }, 220);
      });
    }

    bindSellerLookup(applyPhone, applyName, applyHint);

    form.querySelectorAll(".js-manual-stock-row").forEach(function (row) {
      var id = row.getAttribute("data-item-id");
      if (!id) return;
      var phone = row.querySelector('[data-seller-phone="' + id + '"]');
      var name = row.querySelector('[data-seller-name="' + id + '"]');
      var hint = row.querySelector('[data-seller-hint="' + id + '"]');
      bindSellerLookup(phone, name, hint);
    });

    if (copyBtn) {
      copyBtn.addEventListener("click", function () {
        var notesOn = notesEnabledIn();
        var pv = normalizePhoneValue(applyPhone && applyPhone.value);
        var nv = String((applyName && applyName.value) || "").trim().toUpperCase();
        var payRaw = String((applyPayment && applyPayment.value) || "").trim().toLowerCase();
        var payOk = payRaw === "pending_payment" || payRaw === "partially_paid" || payRaw === "paid";
        var noteVal = notesOn ? String((applyNote && applyNote.value) || "").trim().toUpperCase() : "";
        if (!pv || !nv || !payOk) {
          if (feedback) {
            feedback.textContent =
              "Fill supplier phone, seller name, and payment above before copying to rows.";
          }
          return;
        }
        var copied = 0;

        form.querySelectorAll(".js-manual-stock-row").forEach(function (row) {
          var id = row.getAttribute("data-item-id");
          if (!id) return;
          var qtyEl = row.querySelector('input[name="qty_' + id + '"]');
          var qty = parseFloat(String((qtyEl && qtyEl.value) || "").replace(",", "."));
          if (!isFinite(qty) || !(qty > 0)) return;
          copied += 1;
          var pEl = row.querySelector('input[name="seller_phone_' + id + '"]');
          var nEl = row.querySelector('input[name="seller_name_' + id + '"]');
          var payEl = row.querySelector('select[name="payment_status_' + id + '"]');
          var noteEl = row.querySelector('input[name="note_' + id + '"]');
          var hintEl = row.querySelector('[data-seller-hint="' + id + '"]');
          if (pEl) pEl.value = pv;
          if (nEl) nEl.value = nv;
          if (payEl && payOk) payEl.value = payRaw;
          if (notesOn && noteEl && noteVal) noteEl.value = noteVal;
          if (hintEl) hintEl.textContent = "";
        });

        if (!feedback) return;
        if (!copied) {
          feedback.textContent = "No rows updated - enter quantity on target lines, then copy again.";
        } else {
          feedback.textContent = "Copied supplier phone, seller, and payment to " + copied + " row(s) with quantity.";
        }
      });
    }

    function paymentLabel(raw) {
      if (raw === "partially_paid") return "Partial";
      if (raw === "paid") return "Paid";
      return "Not paid";
    }

    form.addEventListener("submit", function (ev) {
      if (shopStockFormConfirmed(form)) {
        shopStockClearConfirmed(form);
        return;
      }
      var payAllowed = { pending_payment: 1, partially_paid: 1, paid: 1 };
      var issues = [];
      var firstBad = null;
      var rows = [];
      form.querySelectorAll(".js-manual-stock-row").forEach(function (row) {
        var id = row.getAttribute("data-item-id");
        if (!id) return;
        var qtyEl = row.querySelector('input[name="qty_' + id + '"]');
        var priceEl = row.querySelector('input[name="buying_price_' + id + '"]');
        var nameEl = row.querySelector('input[name="seller_name_' + id + '"]');
        var phoneEl = row.querySelector('input[name="seller_phone_' + id + '"]');
        var payEl = row.querySelector('select[name="payment_status_' + id + '"]');

        var qtyRaw = String((qtyEl && qtyEl.value) || "").trim();
        var qtyState = null;
        if (qtyRaw) {
          var qty = parseFloat(qtyRaw.replace(",", "."));
          qtyState = isFinite(qty) && qty > 0 ? qty : false;
        }
        var priceRaw = String((priceEl && priceEl.value) || "").trim();
        var nameRaw = String((nameEl && nameEl.value) || "").trim();
        var phoneRaw = String((phoneEl && phoneEl.value) || "").trim();
        var payRaw = String((payEl && payEl.value) || "").trim().toLowerCase();
        var payOk = !!payAllowed[payRaw];
        var noteRaw = notesEnabledIn() ? String((row.querySelector('input[name="note_' + id + '"]') || {}).value || "").trim() : "";
        var bulkPhone = String((applyPhone && applyPhone.value) || "").trim();
        var bulkName = String((applyName && applyName.value) || "").trim();
        var touched = !!(nameRaw || phoneRaw || bulkPhone || bulkName) || !!(notesEnabledIn() && noteRaw);

        if (typeof qtyState === "number") {
          if (!priceRaw) { issues.push("Item #" + id + ": buying price required with quantity."); firstBad = firstBad || row; }
          else if (!payOk) { issues.push("Item #" + id + ": choose payment (Not paid / Partial / Paid)."); firstBad = firstBad || row; }
          else if (!phoneRaw && !bulkPhone) { issues.push("Item #" + id + ": supplier phone required with quantity (or use bulk phone)."); firstBad = firstBad || row; }
          else if (!nameRaw && !bulkName) { issues.push("Item #" + id + ": seller name required with quantity (or use bulk seller)."); firstBad = firstBad || row; }
          else if (notesRequiredBySettingsIn() && !noteRaw && !(applyNote && String(applyNote.value || "").trim())) {
            issues.push("Item #" + id + ": note required with quantity (or use bulk note).");
            firstBad = firstBad || row;
          }
          else {
            var itemName = row.querySelector("td") ? row.querySelector("td").textContent.trim() : "";
            var confirmRow = ["In", itemName, qtyRaw, priceRaw, nameRaw || bulkName, phoneRaw || bulkPhone || "—", paymentLabel(payRaw)];
            if (notesEnabledIn()) confirmRow.push(noteRaw || "—");
            rows.push(confirmRow);
          }
        } else if (qtyState === false) {
          issues.push("Item #" + id + ": quantity must be a positive number or blank.");
          firstBad = firstBad || row;
        } else if (touched) {
          issues.push("Item #" + id + ": add quantity or clear supplier fields.");
          firstBad = firstBad || row;
        }
      });

      if (issues.length) {
        ev.preventDefault();
        window.alert(issues.slice(0, 6).join("\n") + (issues.length > 6 ? "\n..." : ""));
        if (firstBad) {
          try {
            firstBad.classList.remove("hidden");
            firstBad.scrollIntoView({ block: "center", behavior: "smooth" });
          } catch (_e) {}
        }
        return;
      }
      if (!rows.length) {
        ev.preventDefault();
        window.alert("Enter quantity on at least one line before submitting.");
        return;
      }
      ev.preventDefault();
      var confirmColumns = [
        { label: "Type", key: "type" },
        { label: "Item", key: "item" },
        { label: "Qty", key: "qty", align: "right" },
        { label: "Buy", align: "right" },
        { label: "Seller" },
        { label: "Phone" },
        { label: "Payment" }
      ];
      if (notesEnabledIn()) confirmColumns.push({ label: "Note" });
      shopStockShowSubmitConfirm(form, {
        title: "Confirm manual stock in",
        subtitle: "Shop stock will increase for the lines below.",
        columns: confirmColumns,
        rows: rows,
        confirmLabel: "Submit stock in",
        confirmClass: "btn-rc-success"
      });
    });
  })();
</script>

<script>
  (function () {
    var form = document.getElementById("stk-workspace-out");
    if (!form) return;

    var applyReason = document.getElementById("js-manual-out-apply-reason");
    var applyRefunded = document.getElementById("js-manual-out-apply-refunded");
    var applyNote = document.getElementById("js-manual-out-apply-note");

    function refundsRequiredBySettings() {

    function notesRequiredBySettingsOut() {

    function refundsEnabled() {

      return !!(showNotesToggle && showNotesToggle.checked);

    function setOptColVisible(el, show) {
      if (!el) return;

    function syncCatColspan() {
      var n = 4;
      if (refundsEnabled()) {
        n += 1;

        form.querySelectorAll(".js-manual-out-refunded").forEach(function (sel) {

        td.colSpan = n;
      });

    function syncRefundHeader() {
      var head = form.querySelector(".js-manual-out-amt-head");
      if (!refundsEnabled()) {
        setOptColVisible(head, false);
        form.querySelectorAll(".js-manual-out-amt-cell").forEach(function (cell) {
          setOptColVisible(cell, false);
        });
        syncCatColspan();
        return;
      }
      var any = false;
      form.querySelectorAll(".js-manual-out-refunded").forEach(function (sel) {
        if (sel.value === "yes") any = true;
      });
      setOptColVisible(head, any);

    function syncRefundRow(itemId) {
      var sel = form.querySelector('[name="out_refunded_' + itemId + '"]');

      if (!sel) return;
      var refundsOn = refundsEnabled();
      setOptColVisible(refundCell, refundsOn);
      var yes = refundsOn && sel.value === "yes";
      setOptColVisible(amtCell, yes);
      if (amt && !yes) amt.value = "";

    function syncAllRefundRows() {
      form.querySelectorAll(".js-manual-out-refunded").forEach(function (sel) {

    function syncRefundVisible(on) {
      if (bulkRefundWrap) bulkRefundWrap.classList.toggle("hidden", !on);
      if (!on) {
        form.querySelectorAll(".js-manual-out-refunded").forEach(function (sel) { sel.value = "no"; });

        if (applyRefunded) applyRefunded.value = "no";
      }
      syncAllRefundRows();
    }

    function syncNotesVisible(on) {
      form.querySelectorAll(".js-manual-out-note-head, .js-manual-out-note-cell").forEach(function (el) {
        setOptColVisible(el, on);
      });
      if (bulkNoteWrap) bulkNoteWrap.classList.toggle("hidden", !on);
      if (!on) {
        form.querySelectorAll('input[name^="out_note_"]').forEach(function (el) { el.value = ""; });
        if (applyNote) applyNote.value = "";
      }
      syncCatColspan();
    }

    if (showRefundToggle) {

        if (refundsRequiredBySettings()) return;

        showRefundToggle.checked = true;
        syncRefundVisible(true);
      } else {
        syncRefundVisible(false);
      }
    } else if (refundsRequiredBySettings()) {

    if (showNotesToggle) {

      syncNotesVisible(true);
    }

      });

        });

          ? "Copied reason" + (refundsEnabled() ? "/refund" : "") + (notesOn && noteVal ? "/note" : "") + " to " + copied + " row(s) with quantity."
          : "No rows updated - enter qty out on target lines, then copy again.";
      });

    function reasonLabel(raw) {

        var reason = String((reasonEl && reasonEl.value) || "").trim().toLowerCase();
        var refunded = refundsEnabled()
          ? String((refundedEl && refundedEl.value) || "no").trim().toLowerCase()
          : "no";
        var refundAmtRaw = refundsEnabled() ? String((refundAmtEl && refundAmtEl.value) || "").trim() : "";
        var noteRaw = notesEnabled() ? String((noteEl && noteEl.value) || "").trim() : "";
        var touched = !!(reason || noteRaw || refundAmtRaw || (refundsEnabled() && refunded === "yes"));

        if (typeof qtyState === "number") {
          if (!allowedReason[reason]) {
            issues.push("Item #" + id + ": choose a reason (Return, Waste, or Display).");

            issues.push("Item #" + id + ": refund amount required when Refund is Yes.");

            issues.push("Item #" + id + ": note required with quantity (or use bulk note).");
            firstBad = firstBad || row;
          } else {
            var itemName = row.querySelector("td") ? row.querySelector("td").textContent.trim() : "";
            var confirmRow = ["Out", itemName, qtyRaw, reasonLabel(reason)];
            if (refundsEnabled()) {
              confirmRow.push(refunded === "yes" ? "Yes (" + refundAmtRaw + ")" : "No");
            }
            if (notesEnabled()) confirmRow.push(noteRaw || "—");
            rows.push(confirmRow);
          }
        } else if (qtyState === false) {
          issues.push("Item #" + id + ": quantity must be a positive number or blank.");
          firstBad = firstBad || row;
        } else if (touched) {
          issues.push("Item #" + id + ": add quantity or clear reason/refund/note fields.");
          firstBad = firstBad || row;
        }
      });

      if (issues.length) {
        ev.preventDefault();
        window.alert(issues.slice(0, 6).join("\n") + (issues.length > 6 ? "\n..." : ""));
        if (firstBad) {
          try {
            firstBad.scrollIntoView({ block: "center", behavior: "smooth" });
          } catch (_e) {}
        }
        return;
      }
      if (!rows.length) {
        ev.preventDefault();
        window.alert("Enter quantity on at least one line before submitting.");
        return;
      }
      ev.preventDefault();
      var confirmColumns = [
        { label: "Type", key: "type" },
        { label: "Item", key: "item" },
        { label: "Qty", key: "qty", align: "right" },
        { label: "Reason" }
      ];
      if (refundsEnabled()) confirmColumns.push({ label: "Refund" });
      if (notesEnabled()) confirmColumns.push({ label: "Note" });
      shopStockShowSubmitConfirm(form, {
        title: "Confirm manual stock out",
        subtitle: "Shop stock will decrease for the lines below.",
        columns: confirmColumns,
        rows: rows,
        confirmLabel: "Submit stock out",
        confirmClass: "btn-rc-danger"
      });
    });
  })();
</script>

<script>
  (function () {
    var searchInput = document.getElementById("shop-catalog-search");
    var countEl = document.getElementById("shop-catalog-visible-count");
    var rows = Array.prototype.slice.call(document.querySelectorAll(".js-catalog-row"));
    if (!searchInput || !rows.length) return;

    function syncCatalog() {
      var q = (searchInput.value || "").trim().toLowerCase();
      var visible = 0;
      rows.forEach(function (row) {
        var hay = (row.getAttribute("data-catalog-search") || "").toLowerCase();
        var show = !q || hay.indexOf(q) !== -1;
        row.style.display = show ? "" : "none";
        var editRow = row.nextElementSibling;
        if (editRow && editRow.classList.contains("sa-stock-mgmt-edit-row")) {
          editRow.style.display = show ? "" : "none";
        }
        if (show) visible += 1;
      });
      if (countEl) countEl.textContent = String(visible);
    }

    searchInput.addEventListener("input", syncCatalog);
    syncCatalog();
  })();
</script>

<script>
  (function () {
    var searchInput = document.getElementById("shop-store-activity-search");
    var countEl = document.getElementById("shop-store-activity-visible-count");
    var rows = Array.prototype.slice.call(document.querySelectorAll(".js-activity-row"));
    var filters = Array.prototype.slice.call(document.querySelectorAll(".stk-activity-filter"));
    if (!rows.length) return;

    var activeDir = "all";

    function setDirFilter(dir) {
      activeDir = dir || "all";
      filters.forEach(function (btn) {
        var on = (btn.getAttribute("data-activity-dir") || "all") === activeDir;
        btn.classList.toggle("shop-analytics-tab-active", on);
        btn.classList.toggle("text-[rgb(var(--rc-muted))]", !on);
      });
      syncActivity();
    }

    function syncActivity() {
      var q = ((searchInput && searchInput.value) || "").trim().toLowerCase();
      var visible = 0;
      rows.forEach(function (row) {
        var hay = (row.getAttribute("data-activity-search") || "").toLowerCase();
        var dir = row.getAttribute("data-activity-dir") || "";
        var dirOk = activeDir === "all" || dir === activeDir;
        var show = dirOk && (!q || hay.indexOf(q) !== -1);
        row.style.display = show ? "" : "none";
        if (show) visible += 1;
      });
      if (countEl) countEl.textContent = String(visible);
    }

    if (searchInput) searchInput.addEventListener("input", syncActivity);
    filters.forEach(function (btn) {
      btn.addEventListener("click", function () {
        setDirFilter(btn.getAttribute("data-activity-dir") || "all");
      });
    });
    syncActivity();
  })();
</script>
