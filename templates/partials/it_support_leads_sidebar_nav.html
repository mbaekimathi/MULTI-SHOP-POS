{# Leads & quotations sub-navigation. leads_nav_active: '' | 'list' | 'share' #}
{% set _ln = leads_nav_active|default(
  'share' if request.endpoint == 'it_support_leads_share_quotation'
  else 'list',
  true
) %}
<p class="mt-2 px-1 text-[10px] font-bold uppercase tracking-[0.18em] text-[rgb(var(--rc-muted))]">Leads</p>
<a
  href="{{ url_for('it_support_leads') }}"
  class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if _ln == 'list' %}bg-[rgb(var(--rc-surface-2))] font-semibold text-[rgb(var(--rc-page-fg))]{% else %}text-[rgb(var(--rc-page-fg))] hover:bg-[rgb(var(--rc-surface-2))]{% endif %}"
  {% if _ln == 'list' %}aria-current="page"{% endif %}
>
  <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
  </svg>
  All quotations
</a>
<a
  href="{{ url_for('it_support_leads_share_quotation') }}"
  class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if _ln == 'share' %}bg-[rgb(var(--rc-surface-2))] font-semibold text-[rgb(var(--rc-page-fg))]{% else %}text-[rgb(var(--rc-page-fg))] hover:bg-[rgb(var(--rc-surface-2))]{% endif %}"
  {% if _ln == 'share' %}aria-current="page"{% endif %}
>
  <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
  </svg>
  Share quotation
</a>
