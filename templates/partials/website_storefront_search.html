{# Product search — filters catalog rows via website-storefront-ui.js #}
<div class="wsf-search flex min-w-0 items-center gap-2 rounded-full px-3.5 py-2 sm:px-4 sm:py-2.5">
  <svg class="h-4 w-4 shrink-0 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
  </svg>
  <input
    type="search"
    class="min-w-0 flex-1 bg-transparent text-base outline-none placeholder:text-zinc-400 sm:text-sm"
    placeholder="{{ storefront_homepage_copy.search_placeholder if storefront_homepage_copy else 'Search products…' }}"
    aria-label="Search products"
  />
</div>
