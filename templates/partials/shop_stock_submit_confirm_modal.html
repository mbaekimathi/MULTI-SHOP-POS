<div id="js-stock-submit-confirm-modal" class="fixed inset-0 z-50 hidden" role="dialog" aria-modal="true" aria-labelledby="js-stock-submit-confirm-title">
  <div class="absolute inset-0 bg-black/55 backdrop-blur-[2px]" data-stock-confirm-dismiss></div>
  <div class="relative mx-auto mt-6 flex max-h-[90vh] w-[95%] max-w-2xl flex-col rounded-2xl border border-[rgb(var(--rc-border))] bg-[rgb(var(--rc-surface))] shadow-2xl sm:mt-12">
    <div class="flex flex-wrap items-start justify-between gap-3 border-b border-[rgb(var(--rc-border))]/80 px-4 py-4 sm:px-5">
      <div class="min-w-0">
        <h4 id="js-stock-submit-confirm-title" class="text-sm font-bold text-[rgb(var(--rc-page-fg))]">Confirm submission</h4>
        <p id="js-stock-submit-confirm-subtitle" class="mt-1 text-xs text-[rgb(var(--rc-muted))]">Review the lines below before updating stock.</p>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <span id="js-stock-submit-confirm-meta" class="text-[10px] font-bold uppercase tracking-[0.14em] text-[rgb(var(--rc-muted))]"></span>
        <button type="button" id="js-stock-submit-confirm-close" class="rounded-lg border border-[rgb(var(--rc-border))] px-2 py-1 text-xs">Close</button>
      </div>
    </div>
    <div class="min-h-0 flex-1 overflow-auto px-4 py-3 sm:px-5">
      <div class="shop-mgmt-table-wrap overflow-x-auto">
        <table class="sa-stock-data-table min-w-[28rem] w-full text-sm">
          <thead id="js-stock-submit-confirm-head"></thead>
          <tbody id="js-stock-submit-confirm-body"></tbody>
        </table>
      </div>
      <p class="sa-stock-mgmt-table-scroll-hint shop-mgmt-scroll-hint mt-2" aria-hidden="true">Swipe sideways to see all columns</p>
    </div>
    <div class="flex flex-wrap justify-end gap-2 border-t border-[rgb(var(--rc-border))]/80 px-4 py-4 sm:px-5">
      <button type="button" id="js-stock-submit-confirm-cancel" class="btn-rc btn-rc-ghost px-4 py-2 text-sm">Cancel</button>
      <button type="button" id="js-stock-submit-confirm-ok" class="btn-rc btn-rc-primary px-4 py-2 text-sm">Confirm &amp; submit</button>
    </div>
  </div>
</div>
