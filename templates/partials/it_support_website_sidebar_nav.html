{# Website management sidebar. website_nav_active: '' | 'designs' #}
{% set _wn = website_nav_active|default(
  'designs' if request.endpoint == 'it_support_website_designs' else '',
  true
) %}
<p class="mt-2 px-1 text-[10px] font-bold uppercase tracking-[0.18em] text-[rgb(var(--rc-muted))]">Website</p>
<a
  href="{{ url_for('it_support_website_designs') }}"
  class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition {% if _wn == 'designs' %}bg-[rgb(var(--rc-surface-2))] font-semibold text-[rgb(var(--rc-page-fg))]{% else %}text-[rgb(var(--rc-page-fg))] hover:bg-[rgb(var(--rc-surface-2))]{% endif %}"
  {% if _wn == 'designs' %}aria-current="page"{% endif %}
>
  <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
  </svg>
  Website builder
</a>
