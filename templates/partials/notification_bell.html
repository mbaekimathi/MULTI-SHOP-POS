{% if notification_bell_visible and (notifications_url or notification_bell_popup) %}
  {% if notification_bell_popup %}
  <button
    type="button"
    data-rc-notif-bell="1"
    data-rc-notif-popup="1"
    data-rc-notif-count="{{ notification_count | default(0) }}"
    data-rc-notif-scope="{{ notification_scope | default('portal') }}"
    class="relative inline-flex h-9 w-9 items-center justify-center rounded-lg border border-[rgb(var(--rc-border))] bg-[rgb(var(--rc-surface))] text-[rgb(var(--rc-page-fg))] hover:bg-[rgb(var(--rc-surface-2))]"
    aria-label="Requests awaiting approval{% if notification_count and notification_count > 0 %} ({{ notification_count }} pending){% endif %}"
    title="Requests awaiting approval{% if notification_count and notification_count > 0 %} — {{ notification_count }} pending{% endif %}"
  >
  {% else %}
  <a
    href="{{ notifications_url }}"
    data-rc-notif-bell="1"
    data-rc-notif-count="{{ notification_count | default(0) }}"
    data-rc-notif-scope="{{ notification_scope | default('portal') }}"
    class="relative inline-flex h-9 w-9 items-center justify-center rounded-lg border border-[rgb(var(--rc-border))] bg-[rgb(var(--rc-surface))] text-[rgb(var(--rc-page-fg))] hover:bg-[rgb(var(--rc-surface-2))]"
    aria-label="Notifications{% if notification_count and notification_count > 0 %} ({{ notification_count }} awaiting approval){% endif %}"
    title="Notifications{% if notification_count and notification_count > 0 %} — {{ notification_count }} awaiting approval{% endif %}"
  >
  {% endif %}
    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V4a2 2 0 10-4 0v1.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0a3 3 0 11-6 0m6 0H9" />
    </svg>
    {% if notification_count and notification_count > 0 %}
      <span class="absolute -right-1 -top-1 inline-flex min-w-[1.1rem] items-center justify-center rounded-full bg-rose-500 px-1 text-[10px] font-bold leading-4 text-white">
        {{ notification_count if notification_count < 100 else '99+' }}
      </span>
    {% endif %}
  {% if notification_bell_popup %}
  </button>
  {% else %}
  </a>
  {% endif %}
  {% if not notification_bell_popup %}
  <script>
    (function () {
      var bell = document.querySelector("[data-rc-notif-bell]:not([data-rc-notif-popup])");
      if (!bell) return;
      var scope = bell.getAttribute("data-rc-notif-scope") || "portal";
      var key = "rc_notif_seen_" + scope;
      var count = parseInt(bell.getAttribute("data-rc-notif-count") || "0", 10) || 0;
      var seen = 0;
      try {
        seen = parseInt(localStorage.getItem(key) || "0", 10) || 0;
      } catch (e) {}
      if (count < seen) {
        try {
          localStorage.setItem(key, String(count));
        } catch (e) {}
        seen = count;
      }
      if (window.location.pathname.indexOf("/notifications") !== -1) {
        try {
          localStorage.setItem(key, String(count));
        } catch (e) {}
        return;
      }
      if (count > seen) {
        try {
          var Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) {
            var ctx = new Ctx();
            var o = ctx.createOscillator();
            var g = ctx.createGain();
            o.type = "sine";
            o.frequency.value = 880;
            g.gain.value = 0.08;
            o.connect(g);
            g.connect(ctx.destination);
            o.start();
            o.stop(ctx.currentTime + 0.12);
          }
        } catch (e) {}
        try {
          localStorage.setItem(key, String(count));
        } catch (e) {}
      }
    })();
  </script>
  {% endif %}
{% endif %}
