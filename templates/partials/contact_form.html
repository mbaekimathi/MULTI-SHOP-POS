            <div class="form-contact-card">
              <div class="form-contact-accent" aria-hidden="true"></div>
              <form id="contact-form" action="{{ url_for('contact') }}" method="post" class="p-6 sm:p-8">
                <div class="mb-7 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
                  <div>
                    <p class="text-xs font-bold uppercase tracking-[0.2em] text-brand-600 dark:text-brand-400">Contact</p>
                    <h3 class="mt-1 text-xl font-extrabold tracking-tight text-slate-900 dark:text-white">Send us a message</h3>
                    <p class="mt-1 max-w-md text-sm text-slate-600 dark:text-slate-400">We usually reply within one business day.</p>
                  </div>
                  <div class="hidden h-12 w-12 shrink-0 rounded-2xl bg-gradient-to-br from-brand-400 to-brand-600 shadow-lg shadow-brand-500/30 ring-2 ring-white/50 sm:flex sm:items-center sm:justify-center" aria-hidden="true">
                    <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                    </svg>
                  </div>
                </div>
                <div class="grid gap-5 sm:grid-cols-2">
                  <div class="sm:col-span-2">
                    <label for="name" class="form-label">Name</label>
                    <div class="form-input-wrap">
                      <svg class="form-input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                      </svg>
                      <input
                        id="name"
                        name="name"
                        required
                        autocomplete="name"
                        class="form-input-rich"
                        placeholder="Your name"
                      />
                    </div>
                  </div>
                  <div>
                    <label for="email" class="form-label">Email</label>
                    <div class="form-input-wrap">
                      <svg class="form-input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                      </svg>
                      <input
                        id="email"
                        name="email"
                        type="email"
                        required
                        autocomplete="email"
                        class="form-input-rich"
                        placeholder="you@company.com"
                      />
                    </div>
                  </div>
                  <div>
                    <label for="company" class="form-label">Company</label>
                    <div class="form-input-wrap">
                      <svg class="form-input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008V8.25zm0 3.75h.008v.008h-.008V12zm0 3.75h.008v.008h-.008V15.75zm0 3.75h.008v.008h-.008V19.5z" />
                      </svg>
                      <input
                        id="company"
                        name="company"
                        autocomplete="organization"
                        class="form-input-rich"
                        placeholder="Optional"
                      />
                    </div>
                  </div>
                  <div class="sm:col-span-2">
                    <label for="message" class="form-label">Message</label>
                    <textarea
                      id="message"
                      name="message"
                      required
                      rows="4"
                      class="form-input-rich"
                      placeholder="Sites, users, timeline, current pain points…"
                    ></textarea>
                  </div>
                </div>
                <button type="submit" class="btn-modern mt-8 sm:w-auto sm:min-w-[200px]">Send message</button>
                <p id="contact-status" class="mt-3 text-sm font-medium text-slate-700" role="status"></p>
              </form>
            </div>
