{# Runtime config for deferred POS JavaScript bundles. #}
{% set receipt_logo_url = shop_brand_logo_url(shop) or url_for('static', filename='app-icon.svg') %}
<script>
  window.__POS_BOOT = {{ {
    "shopId": shop.id|int,
    "receiptPayBaseUrl": receipt_pay_public_base_url(),
    "inventoryMode": pos_inventory_mode,
    "printing": pos_printing_settings,
    "daraja": daraja_pos_boot if daraja_pos_boot is defined else {"enabled": false},
    "receiptSettings": pos_receipt_settings,
    "holdEnabled": (pos_printing_settings.pos_cart_mode == 'withhold'),
    "openingHours": shop_opening_hours_status if shop_opening_hours_status is defined else {"is_open_now": true},
    "dayOpening": shop_day_opening_boot if shop_day_opening_boot is defined else {"completed": true, "can_submit": false, "requires_stock_confirmation": false},
    "canReturnReceiptItems": can_return_receipt_items|default(false),
    "apis": {
      "stockIn": url_for('shop_pos_stock_in', shop_id=shop.id),
      "refillPortions": url_for('shop_pos_refill_kitchen_portions', shop_id=shop.id) if pos_inventory_mode in ('kitchen', 'both') else "",
      "authorizeEmployee": url_for('shop_pos_authorize_employee', shop_id=shop.id),
      "employeeAuthCache": url_for('shop_pos_employee_auth_cache', shop_id=shop.id),
      "customerLookup": url_for('shop_pos_customer_lookup', shop_id=shop.id),
      "customerSearch": url_for('shop_pos_customer_search', shop_id=shop.id),
      "customerUpsert": url_for('shop_pos_customer_upsert', shop_id=shop.id),
      "recordSale": url_for('shop_pos_record_sale', shop_id=shop.id),
      "recordQuote": url_for('shop_pos_record_quote', shop_id=shop.id),
      "sellerLookup": url_for('shop_pos_seller_lookup', shop_id=shop.id),
      "sellerSearch": url_for('shop_pos_seller_search', shop_id=shop.id),
      "expenseSearch": url_for('shop_expenses_search_json', shop_id=shop.id),
      "catalogStock": url_for('shop_pos_catalog_json', shop_id=shop.id),
      "receiptsList": url_for('shop_receipts_list_json', shop_id=shop.id),
      "receiptsMark": url_for('shop_receipts_mark', shop_id=shop.id),
      "receiptsDetail": url_for('shop_receipts_detail', shop_id=shop.id),
      "receiptsReprint": url_for('shop_receipts_record_reprint', shop_id=shop.id),
      "receiptsReturnLines": url_for('shop_receipts_return_lines', shop_id=shop.id),
      "printer": url_for('shop_pos_printer', shop_id=shop.id),
      "printerQrEscpos": url_for('shop_pos_printer_qr_escpos', shop_id=shop.id),
      "printerSendEscpos": url_for('shop_pos_printer_send_escpos', shop_id=shop.id),
      "printerScanNetwork": url_for('shop_pos_printer_scan_network', shop_id=shop.id),
      "printerScanNetworkStream": url_for('shop_pos_printer_scan_network_stream', shop_id=shop.id),
      "printAgentStatus": url_for('shop_pos_print_agent_status', shop_id=shop.id),
      "printAgentConfigure": url_for('shop_pos_print_agent_configure', shop_id=shop.id),
      "printerTcpReachable": url_for('shop_pos_printer_tcp_reachable', shop_id=shop.id),
      "mpesaStkPush": url_for('shop_pos_mpesa_stk_push', shop_id=shop.id),
      "mpesaStkStatusBase": ('/shops/' ~ shop.id|string ~ '/shop-pos/mpesa-stk-status/'),
      "incomingStockRequests": url_for('shop_pos_incoming_stock_requests_json', shop_id=shop.id),
      "canReviewIncomingStock": notification_bell_visible|default(false),
      "holdSave": url_for('shop_pos_hold_save', shop_id=shop.id),
      "holdList": url_for('shop_pos_hold_list', shop_id=shop.id),
      "holdGetBase": ('/shops/' ~ shop.id|string ~ '/shop-pos/hold/'),
      "dayOpening": url_for('shop_pos_day_opening_submit', shop_id=shop.id),
      "dayOpeningStatus": url_for('shop_pos_day_opening_status', shop_id=shop.id),
      "dayClosing": url_for('shop_pos_day_closing_submit', shop_id=shop.id),
    },
    "site": {
      "company_name": (_shop_co.company_name if _shop_co else (site_settings.company_name if site_settings else "")) or "",
      "company_email": (_shop_co.company_email if _shop_co else (site_settings.company_email if site_settings else "")) or "",
      "company_phone": (_shop_co.company_phone if _shop_co else (site_settings.company_phone if site_settings else "")) or "",
      "shop_name": shop.shop_name or "",
      "shop_code": shop.shop_code or "",
      "shop_location": shop.shop_location or "",
      "app_icon_url": url_for('static', filename=_shop_co.app_icon) if _shop_co and _shop_co.app_icon else (url_for('static', filename=site_settings.app_icon) if site_settings and site_settings.app_icon else url_for('static', filename='app-icon.svg')),
      "receipt_logo_url": receipt_logo_url,
    },
  }|tojson }};
</script>
