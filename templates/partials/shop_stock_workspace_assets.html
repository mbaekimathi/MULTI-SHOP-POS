<script>
  (function () {
    function wireStockDateFilter(form) {
      var mode = form.querySelector('[name="mode"]');
      if (!mode) return;
      var day = form.querySelector('[data-stock-filter="single_day"]');
      var period = form.querySelector('[data-stock-filter="period"]');
      var month = form.querySelector('[data-stock-filter="month"]');
      var year = form.querySelector('[data-stock-filter="year"]');
      function sync() {
        var m = mode.value || "single_day";
        if (m === "all") {
          if (day) day.classList.add("hidden");
          if (period) period.classList.add("hidden");
          if (month) month.classList.add("hidden");
          if (year) year.classList.add("hidden");
          return;
        }
        if (day) day.classList.toggle("hidden", m !== "single_day");
        if (period) period.classList.toggle("hidden", m !== "period");
        if (month) month.classList.toggle("hidden", m !== "month");
        if (year) year.classList.toggle("hidden", m !== "year");
      }
      mode.addEventListener("change", sync);
      sync();
    }

    function wireStockLiveFilter(form) {
      if (window.PortalLiveFilters) return;
      if (!form || !form.classList.contains("sa-stock-live-filter")) return;
      wireStockDateFilter(form);
      var submitTimer = null;
      var searchTimer = null;
      function submitSoon(delay) {
        if (submitTimer) clearTimeout(submitTimer);
        submitTimer = setTimeout(function () {
          submitTimer = null;
          if (typeof form.requestSubmit === "function") {
            form.requestSubmit();
          } else {
            form.submit();
          }
        }, delay == null ? 120 : delay);
      }
      form.querySelectorAll("select").forEach(function (el) {
        el.addEventListener("change", function () {
          if (el.name === "mode") {
            submitSoon(80);
          } else {
            submitSoon();
          }
        });
      });
      form.querySelectorAll('input[type="date"], input[type="month"]').forEach(function (el) {
        el.addEventListener("change", function () {
          submitSoon();
        });
      });
      var yearInput = form.querySelector('input[type="number"][name="year"]');
      if (yearInput) {
        yearInput.addEventListener("change", function () {
          submitSoon();
        });
        yearInput.addEventListener("input", function () {
          if (searchTimer) clearTimeout(searchTimer);
          searchTimer = setTimeout(function () {
            searchTimer = null;
            var y = parseInt(yearInput.value, 10);
            if (y >= 2000 && y <= 2100) submitSoon(0);
          }, 450);
        });
      }
      var reorderInput = form.querySelector('input[name="reorder_threshold"]');
      if (reorderInput) {
        reorderInput.addEventListener("change", function () {
          submitSoon();
        });
      }
      form.querySelectorAll('input[type="search"]').forEach(function (el) {
        el.addEventListener("input", function () {
          if (searchTimer) clearTimeout(searchTimer);
          searchTimer = setTimeout(function () {
            searchTimer = null;
            submitSoon(200);
          }, 500);
        });
      });
    }

    function wireStockTabs(reportRoot, rawBtn, visualBtn, storageKey) {
      if (!reportRoot || !rawBtn || !visualBtn) return;
      function setView(view) {
        var v = view === "visual" ? "visual" : "raw";
        reportRoot.setAttribute("data-shop-analytics-report-view", v);
        rawBtn.classList.toggle("shop-analytics-tab-active", v === "raw");
        visualBtn.classList.toggle("shop-analytics-tab-active", v === "visual");
        rawBtn.setAttribute("aria-selected", v === "raw" ? "true" : "false");
        visualBtn.setAttribute("aria-selected", v === "visual" ? "true" : "false");
        try {
          localStorage.setItem(storageKey, v);
        } catch (_e) {}
        if (v === "visual") {
          requestAnimationFrame(function () {
            window.dispatchEvent(new Event("resize"));
          });
        }
      }
      rawBtn.addEventListener("click", function () {
        setView("raw");
      });
      visualBtn.addEventListener("click", function () {
        setView("visual");
      });
      try {
        setView(localStorage.getItem(storageKey) || "raw");
      } catch (_e) {
        setView("raw");
      }
    }

    document.querySelectorAll(".sa-stock-live-filter").forEach(wireStockLiveFilter);
    document.querySelectorAll(".sa-stock-date-filter").forEach(wireStockDateFilter);
    document.querySelectorAll("form[data-stock-apply-filter]").forEach(function (form) {
      form.addEventListener("submit", function () {
        var spin = form.querySelector("[data-stock-apply-spin]");
        var btn = form.querySelector("[data-stock-apply-btn]");
        if (spin) spin.classList.remove("hidden");
        if (btn) btn.disabled = true;
        var overlay = document.querySelector("[data-stock-load-overlay]");
        if (overlay) overlay.classList.remove("hidden");
      });
    });
    wireStockTabs(
      document.getElementById("shop-stock-report-root"),
      document.getElementById("shop-stock-tab-raw"),
      document.getElementById("shop-stock-tab-visual"),
      "shop-stock-analytics-report-view"
    );
  })();
</script>
