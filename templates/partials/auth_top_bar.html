{# Fixed bar: brand, marketing links, theme toggle. Use on login / shop-login / signup. #}
<div class="auth-top-bar">
  <a href="{{ url_for('index') }}" class="auth-top-bar__brand">
    {% if site_settings and site_settings.app_icon %}
      <img src="{{ url_for('static', filename=site_settings.app_icon) }}" alt="" />
    {% else %}
      <span class="auth-top-bar__brand-mark" aria-hidden="true">{{ pub_brand_mark }}</span>
    {% endif %}
    <span class="truncate">{{ pub_brand_name }}</span>
  </a>
  <div class="auth-top-bar__nav">
    <a href="{{ url_for('index') }}">Home</a>
    <a href="{{ url_for('marketing_features') }}">Solutions</a>
    <a href="{{ url_for('marketing_contact') }}">Contact</a>
    {% include "partials/theme_toggle.html" %}
  </div>
</div>
