{# Login-as dropdown for a shop row. Expects shop ``s``. #}
<div
  class="js-shop-login-wrap inline-flex min-w-[11rem] max-w-full flex-col gap-1.5 sm:flex-row sm:items-center"
  data-admin-url="{{ url_for('shop_dashboard', shop_id=s.id) }}"
  data-manager-url="{{ url_for('employee_login', next=url_for('shop_dashboard', shop_id=s.id)) }}"
>
  <label class="sr-only" for="shop-login-as-{{ s.id }}">Login as</label>
  <select
    id="shop-login-as-{{ s.id }}"
    class="js-shop-login-as w-full min-w-0 rounded-xl border border-[rgb(var(--rc-border))] bg-[rgb(var(--rc-surface))] px-3 py-2 text-xs font-semibold text-[rgb(var(--rc-page-fg))] outline-none ring-[rgb(var(--rc-primary))]/30 focus:ring-2 sm:min-w-[10.5rem]"
  >
    <option value="">Login as…</option>
    <option value="admin">Shop admin</option>
    <option value="manager">Shop manager</option>
  </select>
  <button
    type="button"
    class="js-shop-login-go btn-rc btn-rc-primary shrink-0 px-3 py-2 text-xs"
    title="Open the selected login for this shop"
  >
    Go
  </button>
</div>
