<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="ibs-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="ibs-floor" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ibs-awn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="ibs-win" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="520" height="300" rx="16" fill="url(#ibs-bg)"/>
  <ellipse cx="260" cy="262" rx="210" ry="32" fill="url(#ibs-floor)"/>
  <path d="M40 228h440" stroke="#3f3f46" stroke-opacity="0.5" stroke-width="1"/>
  <!-- Main storefront -->
  <g>
    <rect x="120" y="78" width="280" height="150" rx="14" fill="#27272a" stroke="#52525b" stroke-width="1.2"/>
    <!-- Awning -->
    <path d="M108 96c0-4 4-8 8-8h288c4 0 8 4 8 8v28H108V96z" fill="url(#ibs-awn)"/>
    <g opacity="0.22">
      <path d="M124 88v44M148 86v46M172 84v48M196 86v46M220 88v44M244 90v42M268 88v44M292 86v46M316 84v48M340 86v46M364 88v44" stroke="#faf5ff" stroke-width="2.5"/>
    </g>
    <!-- Display window -->
    <rect x="158" y="120" width="100" height="74" rx="8" fill="url(#ibs-win)" stroke="#a78bfa" stroke-opacity="0.55" stroke-width="1.4"/>
    <path d="M208 120v74M158 157h100" stroke="#6d28d9" stroke-opacity="0.25" stroke-width="1"/>
    <!-- Door -->
    <rect x="292" y="138" width="54" height="90" rx="6" fill="#3f3f46" stroke="#71717a"/>
    <circle cx="332" cy="184" r="2.5" fill="#c4b5fd"/>
    <!-- Counter hint -->
    <rect x="170" y="176" width="76" height="10" rx="2" fill="#52525b" fill-opacity="0.8"/>
  </g>
  <!-- Location pin = branch -->
  <g transform="translate(400 58)">
    <circle r="32" fill="#7c3aed" fill-opacity="0.15"/>
    <circle r="20" fill="#7c3aed" fill-opacity="0.35"/>
    <path d="M0 6c-7.5 0-13.5-6-13.5-13.5S-7.5-21 0-21s13.5 6 13.5 13.5S7.5 6 0 6z" fill="#ddd6fe"/>
    <circle cy="-8" r="3.5" fill="#5b21b6"/>
    <path d="M-7 10h14l-7 12z" fill="#a78bfa"/>
  </g>
  <!-- Smaller “sister” branches -->
  <rect x="52" y="174" width="42" height="50" rx="6" fill="#3f3f46" stroke="#52525b" opacity="0.45"/>
  <rect x="426" y="178" width="42" height="46" rx="6" fill="#3f3f46" stroke="#52525b" opacity="0.45"/>
  <path d="M94 198h26M400 200h26" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1.2" stroke-dasharray="3 5"/>
  <circle cx="120" cy="198" r="2.5" fill="#7c3aed" fill-opacity="0.55"/>
  <circle cx="400" cy="200" r="2.5" fill="#7c3aed" fill-opacity="0.55"/>
</svg>
