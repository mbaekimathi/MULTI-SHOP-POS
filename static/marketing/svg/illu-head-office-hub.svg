<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="hoh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="45%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="hoh-hub" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="hoh-glow" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="520" height="300" rx="16" fill="url(#hoh-bg)"/>
  <ellipse cx="260" cy="258" rx="200" ry="30" fill="url(#hoh-glow)"/>
  <path d="M48 220h424" stroke="#3f3f46" stroke-opacity="0.45" stroke-width="1"/>
  <!-- Hub building (head office) -->
  <g>
    <rect x="196" y="64" width="128" height="152" rx="12" fill="#27272a" stroke="#52525b" stroke-width="1.2"/>
    <rect x="208" y="78" width="104" height="28" rx="4" fill="url(#hoh-hub)" opacity="0.95"/>
    <rect x="214" y="86" width="36" height="12" rx="2" fill="#faf5ff" fill-opacity="0.9"/>
    <rect x="258" y="88" width="48" height="8" rx="1" fill="#52525b"/>
    <!-- Windows grid -->
    <rect x="214" y="118" width="36" height="28" rx="4" fill="#3f3f46" stroke="#71717a"/>
    <rect x="262" y="118" width="36" height="28" rx="4" fill="#3f3f46" stroke="#71717a"/>
    <rect x="214" y="156" width="36" height="28" rx="4" fill="#3f3f46" stroke="#71717a"/>
    <rect x="262" y="156" width="36" height="28" rx="4" fill="#3f3f46" stroke="#71717a"/>
    <rect x="238" y="196" width="44" height="52" rx="4" fill="#18181b" stroke="#7c3aed" stroke-opacity="0.6"/>
    <circle cx="274" cy="224" r="2" fill="#a78bfa"/>
  </g>
  <!-- Branch nodes -->
  <g opacity="0.9">
    <rect x="56" y="140" width="56" height="64" rx="8" fill="#3f3f46" stroke="#7c3aed" stroke-opacity="0.4"/>
    <rect x="68" y="152" width="20" height="24" rx="2" fill="#52525b"/>
    <rect x="408" y="136" width="56" height="68" rx="8" fill="#3f3f46" stroke="#7c3aed" stroke-opacity="0.4"/>
    <rect x="420" y="148" width="20" height="24" rx="2" fill="#52525b"/>
  </g>
  <!-- Connection lines hub to branches -->
  <path d="M112 176 L196 140" stroke="#7c3aed" stroke-opacity="0.45" stroke-width="1.5"/>
  <path d="M408 176 L324 140" stroke="#7c3aed" stroke-opacity="0.45" stroke-width="1.5"/>
  <circle cx="112" cy="176" r="4" fill="#7c3aed" fill-opacity="0.7"/>
  <circle cx="408" cy="176" r="4" fill="#7c3aed" fill-opacity="0.7"/>
  <!-- Data / reporting motif -->
  <g transform="translate(228 44)" opacity="0.85">
    <rect x="0" y="0" width="64" height="14" rx="3" fill="#7c3aed" fill-opacity="0.25"/>
    <rect x="8" y="4" width="20" height="6" rx="1" fill="#c4b5fd"/>
    <rect x="36" y="4" width="20" height="6" rx="1" fill="#52525b"/>
  </g>
